<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Animal MMO</title>
<link rel="stylesheet" href="style.css?v=20260312-sync2">
<script src="https://cdn.jsdelivr.net/npm/three@0.152/build/three.min.js"></script>
</head>
<body>
<div id="ui" class="auth-screen">
  <div class="auth-glow auth-glow-left"></div>
  <div class="auth-glow auth-glow-right"></div>

  <section class="auth-card" aria-label="Login und Registrierung">
    <section class="welcomeTitle">
      <p class="kicker">3D Multiplayer</p>
      <h1>Ani-MMO</h1>
      <p class="subtitle">Melde dich an oder erstelle einen neuen Account.</p>
    </section>
    
    <div class="auth-tabs" role="tablist" aria-label="Auth Modi">
      <button id="tabLogin" class="auth-tab active" type="button" role="tab" aria-selected="true">Einloggen</button>
      <button id="tabRegister" class="auth-tab" type="button" role="tab" aria-selected="false">Registrieren</button>
    </div>

    <form id="loginForm" class="auth-form active" autocomplete="on">
      <label for="loginUser">Username</label>
      <input id="loginUser" name="username" minlength="3" maxlength="24" required>

      <label for="loginPass">Passwort</label>
      <input id="loginPass" name="password" type="password" minlength="6" maxlength="18" required>

      <label class="remember-login" for="rememberLogin">
        <input id="rememberLogin" type="checkbox">
        <span>Angemeldet bleiben</span>
      </label>

      <button class="primary-btn" type="submit">Spiel starten</button>
    </form>

    <form id="registerForm" class="auth-form" autocomplete="on">
      <label for="registerUser">Username</label>
      <input id="registerUser" name="username" minlength="3" maxlength="24" required>

      <label for="registerPass">Passwort</label>
      <input id="registerPass" name="password" type="password" minlength="6" maxlength="18" required>

      <label for="registerPass2">Passwort wiederholen</label>
      <input id="registerPass2" name="passwordRepeat" type="password" minlength="6" maxlength="18" required>

      <label for="registerGender">Geschlecht</label>
      <select id="registerGender" name="gender" required>
        <option value="male" selected>Männlich</option>
        <option value="female">Weiblich</option>
      </select>
      
      <button class="primary-btn" type="submit">Account erstellen</button>
    </form>

    <p id="authMessage" class="auth-message" role="status" aria-live="polite"></p>
  </section>
</div>

<canvas id="game"></canvas>

<div id="inventoryUI"></div>

<div id="chatUI" class="chat-ui">
  <div id="chatMessages" class="chat-messages"></div>
  <select id="chatEmoteSelect" class="chat-emote-select" aria-label="Emote auswählen">
    <option value="smile">🙂 Lächeln</option>
    <option value="happy">😄 Fröhlich</option>
    <option value="angry">😠 Wütend</option>
    <option value="sad">😢 Traurig</option>
    <option value="wink">😉 Zwinkern</option>
    <option value="surprised">😮 Erstaunt</option>
  </select>
  <input id="chatInput" class="chat-input" maxlength="180" placeholder="Nachricht eingeben und Enter druecken...">
</div>

<div id="onlineUsers" class="online-users"></div>

<div id="pauseMenu">
  <button onclick="toggleActivePlayersPanel()">Aktive Spieler</button>
  <button onclick="openAdminWindow()">Adminbereich</button>
  <button onclick="resume()">Fortsetzen</button>
  <button class="pause-menu-logout" onclick="logout()">Logout</button>
</div>

<div id="adminWindow" class="admin-window" style="display:none;">
  <div class="admin-panel">
    <div class="admin-head">
      <h3>Adminbereich</h3>
      <button class="admin-close" onclick="closeAdminWindow()">X</button>
    </div>

    <div id="adminAuthSection">
      <p class="admin-note">PIN erforderlich</p>
      <input id="adminPinInput" type="password" maxlength="8" placeholder="Admin PIN">
      <button onclick="submitAdminPin()">Freischalten</button>
    </div>

    <div id="adminControls" style="display:none;">
      <label for="adminPlayerSelect">Spieler</label>
      <select id="adminPlayerSelect"></select>
      <div class="admin-row">
        <button onclick="adminDoAction('freeze')">Freeze/Unfreeze</button>
        <button onclick="adminDoAction('kick')">Kick</button>
        <button onclick="adminDoAction('ban')">Ban</button>
      </div>

      <label for="adminDropItemSelect">Item droppen</label>
      <select id="adminDropItemSelect">
        <option value="fruit">Frucht</option>
        <option value="log">Holzstamm</option>
        <option value="stone">Stein</option>
        <option value="tree_seed">Baumsamen</option>
        <option value="holzlatte">Holzlatte</option>
        <option value="stock">Stock</option>
        <option value="werkbank">Werkbank</option>
        <option value="holzspitzhacke">Holzspitzhacke</option>
        <option value="steinspitzhacke">Steinspitzhacke</option>
        <option value="holzaxt">Holzaxt</option>
        <option value="eimer_leer">Eimer (leer)</option>
        <option value="eimer_voll">Eimer (voll)</option>
        <option value="kiste">Kiste</option>
      </select>
      <button onclick="adminDropSelectedItem()">Drop Item</button>
    </div>

    <p id="adminStatus" class="admin-status"></p>
  </div>
</div>

<div id="mobileControls" class="mobile-controls">
  <div class="mobile-top-right">
    <button id="touchEmote" class="touch-btn touch-btn-small" type="button">Emote</button>
    <button id="touchChat" class="touch-btn touch-btn-small" type="button">Chat</button>
    <button id="touchPause" class="touch-btn touch-btn-small" type="button">Menü</button>
  </div>

  <div class="mobile-left">
    <button id="touchInteract" class="touch-btn" type="button">Interagieren</button>
    <button id="touchJump" class="touch-btn touch-btn-small" type="button">Springen</button>
    <button id="touchSprint" class="touch-btn touch-btn-small" type="button">Sprint</button>
  </div>

  <div class="mobile-right">
    <button id="touchInventory" class="touch-btn touch-btn-small" type="button">Inventar</button>
    <div id="touchPad" class="touch-pad">
      <div id="touchKnob" class="touch-knob"></div>
    </div>
  </div>
</div>

<script src="world.js?v=20260312-sync2"></script>
<script src="player.js?v=20260312-sync2"></script>
<script src="multiplayer.js?v=20260312-sync2"></script>
<script src="animals.js?v=20260312-sync2"></script>
<script src="main.js?v=20260312-sync2"></script>
</body>
</html>
