<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lokationen-Suche</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
<link rel="stylesheet" href="lokationtool_style.css" />
</head>
<body class="fade-in page-suche">

    <!-- Loader -->
    <div id="loader">
        <div class="spinner"></div>
    </div>

<h1 id="pageTitle"></h1>

<div class="search-box">
    <input type="text" id="search" placeholder="">
</div>

<div class="result-box" id="results"></div>

<div id="map"></div>

<div class="btn-container">
    <a href="#" id="openMaps" class="btn" style="display:none;">Google Maps</a>
    <a href="#" id="resetSearch" class="btn" style="display:none; margin-left:10px;">Reset</a>
</div>

<div class="btn-container-bottom">
    <a href="lokationtool_index.html" id="backBtn" class="btn">&#128072; Zurück</a>
    <button id="toggleTable" class="btn" style="margin-left:10px;">2x -> Tabelle</button>
</div>

<table id="dataTable">
    <thead>
        <tr id="tableHeaderRow"></tr>
    </thead>
    <tbody></tbody>
</table>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
document.addEventListener('DOMContentLoaded', () => {
    document.body.classList.add('loaded');
});

/* ---- Dataset-Konfiguration ---- */
const DATASETS = {
    'empg_bohrungen': {
        file: 'empg_bohrungen.json',
        title: '|| EMPG Bohrungen ||<br>-= Ortsuche =-',
        placeholder: 'Ort / Kürzel eingeben...',
        hasKuerzel: true,
        tableHeaders: ['Ort', 'Kürzel', 'Breite', 'Länge']
    },
    'empg_schieber': {
        file: 'empg_schieber.json',
        title: '|| EMPG Schieber ||<br>-= Ortsuche =-',
        placeholder: 'Lokation / Ort eingeben...',
        hasKuerzel: false,
        tableHeaders: ['Ort', 'Breite', 'Länge']
    },
    'gasunie_schieber': {
        file: 'gasunie_schieber.json',
        title: '|| Gasunie Schieber ||<br>-= Ortsuche =-',
        placeholder: 'Lokation / Ort eingeben...',
        hasKuerzel: false,
        tableHeaders: ['Ort', 'Breite', 'Länge']
    }
};

/* ---- URL-Parameter lesen ---- */
const params = new URLSearchParams(window.location.search);
const datasetKey = params.get('dataset');
const config = DATASETS[datasetKey];

if (!config) {
    // Ungültiger oder fehlender Parameter → zurück zur Übersicht
    window.location.replace('suchmaschine_index.html');
}

/* ---- Seite initialisieren ---- */
document.title = config.title.replace(/<br>/gi, ' ').replace(/\|/g, '').replace(/-=/g, '').replace(/=-/g, '').trim();
document.getElementById('pageTitle').innerHTML = config.title;
document.getElementById('search').placeholder = config.placeholder;

/* Tabellen-Header aufbauen */
const headerRow = document.getElementById('tableHeaderRow');
config.tableHeaders.forEach(label => {
    const th = document.createElement('th');
    th.textContent = label;
    headerRow.appendChild(th);
});

/* ---- Daten laden ---- */
const STORAGE_KEY = 'lokation_admin_' + config.file;
let orte = [];

function loadOrte() {
    try {
        const localData = localStorage.getItem(STORAGE_KEY);
        if (localData) {
            const parsed = JSON.parse(localData);
            if (Array.isArray(parsed)) {
                orte = parsed;
                fillTable();
                return;
            }
        }
    } catch (e) {
        // Fallback auf Datei
    }

    fetch(config.file)
        .then(res => res.json())
        .then(data => {
            orte = data;
            fillTable();
        });
}

loadOrte();

/* ---- DOM-Referenzen ---- */
const searchInput   = document.getElementById('search');
const resultsBox    = document.getElementById('results');
const mapDiv        = document.getElementById('map');
const openMapsBtn   = document.getElementById('openMaps');
const resetBtn      = document.getElementById('resetSearch');
const toggleTableBtn = document.getElementById('toggleTable');
const table         = document.getElementById('dataTable');
let map, marker;

/* ---- Tabelle füllen ---- */
function fillTable() {
    const tbody = table.querySelector('tbody');
    tbody.innerHTML = '';

    orte.forEach(o => {
        const row = document.createElement('tr');

        if (config.hasKuerzel) {
            row.innerHTML = `
                <td>${o.ort}</td>
                <td>${o.kuerzel}</td>
                <td>${o.breite.toFixed(7)}</td>
                <td>${o.laenge.toFixed(7)}</td>
            `;
        } else {
            row.innerHTML = `
                <td>${o.ort}</td>
                <td>${o.breite.toFixed(7)}</td>
                <td>${o.laenge.toFixed(7)}</td>
            `;
        }

        row.style.cursor = 'pointer';
        row.addEventListener('click', () => {
            searchInput.value = config.hasKuerzel ? o.kuerzel : o.ort;
            const ev = new Event('input', { bubbles: true });
            searchInput.dispatchEvent(ev);
            selectOrt(o);
            window.scrollTo({ top: 0, behavior: 'smooth' });
            searchInput.focus({ preventScroll: true });
        });
        row.tabIndex = 0;
        row.addEventListener('keydown', e => {
            if (e.key === 'Enter' || e.key === ' ') {
                e.preventDefault();
                row.click();
            }
        });

        tbody.appendChild(row);
    });
}

/* ---- Tabelle ein-/ausblenden ---- */
toggleTableBtn.addEventListener('click', () => {
    if (table.style.display === 'none') {
        table.style.display = 'table';
        toggleTableBtn.textContent = 'Tabelle verstecken';
    } else {
        table.style.display = 'none';
        toggleTableBtn.textContent = 'Tabelle anzeigen';
    }
});

/* ---- Fuzzy-Suche ---- */
function fuzzySearch(query) {
    query = query.toLowerCase();

    if (config.hasKuerzel) {
        const exact = orte.filter(o => o.kuerzel.toLowerCase() === query);
        if (exact.length) return exact;
        return orte.filter(o =>
            o.kuerzel.toLowerCase().includes(query) ||
            o.ort.toLowerCase().includes(query)
        );
    } else {
        const exact = orte.filter(o => o.ort.toLowerCase() === query);
        if (exact.length) return exact;
        return orte.filter(o => o.ort.toLowerCase().includes(query));
    }
}

/* ---- Eingabe-Handler ---- */
searchInput.addEventListener('input', () => {
    const query = searchInput.value.trim();
    resultsBox.innerHTML = '';
    resultsBox.style.display = 'none';
    mapDiv.style.display = 'none';
    openMapsBtn.style.display = 'none';
    resetBtn.style.display = 'none';

    if (!query) return;

    const matches = fuzzySearch(query);

    if (matches.length === 0) {
        resultsBox.innerHTML = '<div class="result-item">Keine Treffer</div>';
        resultsBox.style.display = 'block';
        return;
    }

    matches.forEach(o => {
        const div = document.createElement('div');
        div.className = 'result-item';
        div.textContent = config.hasKuerzel ? `${o.ort} (${o.kuerzel})` : o.ort;
        div.addEventListener('click', () => selectOrt(o));
        resultsBox.appendChild(div);
    });

    resultsBox.style.display = 'block';
});

/* ---- Ort auswählen ---- */
function selectOrt(ort) {
    if (config.hasKuerzel) {
        resultsBox.innerHTML = `<strong><u>${ort.ort} (${ort.kuerzel})</u></strong><br>
        GPS: N° ${ort.breite.toFixed(7)}, O° ${ort.laenge.toFixed(7)}`;
    } else {
        resultsBox.innerHTML = `<strong><u>${ort.ort}</u></strong><br>
        GPS: N° ${ort.breite.toFixed(7)}, O° ${ort.laenge.toFixed(7)}`;
    }
    resultsBox.style.display = 'block';

    mapDiv.style.display = 'block';
    openMapsBtn.style.display = 'inline-block';
    resetBtn.style.display = 'inline-block';

    openMapsBtn.href = `https://www.google.com/maps?q=${ort.breite.toFixed(7)},${ort.laenge.toFixed(7)}`;
    openMapsBtn.target = '_blank';

    if (!map) {
        map = L.map('map').setView([ort.breite, ort.laenge], 13);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        marker = L.marker([ort.breite, ort.laenge]).addTo(map);
    } else {
        map.setView([ort.breite, ort.laenge], 13);
        marker.setLatLng([ort.breite, ort.laenge]);
    }
}

/* ---- Reset ---- */
resetBtn.addEventListener('click', e => {
    e.preventDefault();
    searchInput.value = '';
    resultsBox.style.display = 'none';
    mapDiv.style.display = 'none';
    openMapsBtn.style.display = 'none';
    resetBtn.style.display = 'none';
});
</script>

</body>
</html>
