<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Dark Chat</title>
  <style>
    :root {
      --keyboard-inset: 0px;
    }
  /* --- Lade-Animation Overlay --- */
    #loader {
        position: fixed;
        inset: 0;
        background: #0d0d0d;
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 999;
        animation: fadeOut 0.8s ease 1.2s forwards;
    }

    .spinner {
        width: 42px;
        height: 42px;
        border: 4px solid #333;
        border-top-color: #ffffff;
        border-radius: 50%;
        animation: spin 1s linear infinite;
    }

    @keyframes spin {
        to { transform: rotate(360deg); }
    }

    @keyframes fadeOut {
        to { opacity: 0; visibility: hidden; }
    }

    /* --- Fade-In des Inhalts --- */
    body.fade-in {
        opacity: 0;
        transition: opacity 1s ease 0.3s;
    }

    body.loaded {
        opacity: 1;
    }

    body {
      margin: 0;
      padding: 0;
      background: #0d0d0d;
      font-family: "Segoe UI", Arial, sans-serif;
      color: white;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100dvh;
      height: 100dvh;
      overflow: hidden;
    }

    h1 {
      margin-top: 0;
      font-size: clamp(2rem, 4vw, 3rem);
      letter-spacing: 1.2px;
      text-shadow: 0 0 10px rgba(255,255,255,0.15);
    }

    .container {
      width: 90%;
      max-width: 800px;
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 0;
    }

    /* auth panel */
    #auth {
      margin-top: 1rem;
      animation: fadeIn 0.5s;
    }

    /* mode buttons side by side */
    .mode-buttons {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
      margin-bottom: 2rem;
    }

    .mode-btn {
      padding: 0.85rem;
      border: 2px solid #387ff5;
      border-radius: 6px;
      background: transparent;
      color: #387ff5;
      cursor: pointer;
      transition: all 0.2s ease;
      font-weight: 600;
      font-size: 1rem;
    }

    .mode-btn:hover {
      background: rgba(56, 127, 245, 0.1);
      border-color: #2e6fd1;
    }

    .mode-btn.active {
      background: #387ff5;
      color: #fff;
      box-shadow: 0 4px 12px rgba(56, 127, 245, 0.3);
    }

    form {
      display: none;
      flex-direction: column;
      margin-bottom: 1rem;
      gap: 0.75rem;
    }

    form.active {
      display: flex;
      animation: fadeIn 0.3s;
    }

    input[type="text"],
    input[type="password"] {
      padding: 0.65rem 0.8rem;
      border: 2px solid #333;
      border-radius: 6px;
      background: #1e1e1e;
      color: #eee;
      font-size: 0.95rem;
      transition: border-color 0.2s ease;
    }

    input[type="text"]:focus,
    input[type="password"]:focus {
      outline: none;
      border-color: #387ff5;
    }

    button {
      padding: 0.7rem;
      border: none;
      border-radius: 6px;
      background: #387ff5;
      color: #fff;
      cursor: pointer;
      transition: all 0.2s ease;
      font-weight: 600;
      box-shadow: 0 2px 8px rgba(56, 127, 245, 0.2);
    }

    button:hover {
      background: #2e6fd1;
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(56, 127, 245, 0.3);
    }

    button:active {
      transform: translateY(0);
    }

    /* guest join button */
    #guest-btn {
      margin-top: 0.5rem;
      width:100%;
    }

    #error {
      color: #f55;
      min-height: 1.2em;
      margin-bottom: 1rem;
    }

    #chat {
      display: none;
      flex: 1;
      flex-direction: column;
      margin-top: 0.5rem;
      margin-bottom: 3rem;
      min-height: 0;
    }

    /* Top buttons */
    .top-buttons {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 0.75rem;
      margin-bottom: 1rem;
    }

    .top-btn {
      padding: 0.65rem 1rem;
      background: #387ff5;
      color: #fff;
      border: none;
      border-radius: 6px;
      position: relative;
      cursor: pointer;
      font-size: 0.9rem;
      font-weight: 500;
      transition: all 0.2s ease;
      box-shadow: 0 2px 8px rgba(56, 127, 245, 0.2);
    }

    .top-btn:hover {
      background: #2e6fd1;
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(56, 127, 245, 0.3);
    }

    .top-btn:active {
      transform: translateY(0);
    }

    .chat-mode-indicator {
      padding: 0.65rem 1rem;
      background: #1e1e1e;
      border: 2px solid #387ff5;
      border-radius: 6px;
      font-size: 0.9rem;
      font-weight: 500;
      text-align: center;
      grid-column: 1 / -1;
    }

    /* Modal styles */
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.7);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }

    .modal.show {
      display: flex;
    }

    .modal-content {
      background: #1e1e1e;
      border-radius: 8px;
      padding: 2rem;
      max-width: 400px;
      width: 90%;
      max-height: 80vh;
      overflow-y: auto;
      position: relative;
      animation: slideIn 0.3s ease;
      border: 2px solid #387ff5;
    }

    .modal-content h2 {
      margin-top: 0;
      margin-bottom: 1.5rem;
      font-size: 1.3rem;
    }

    
    .confirm-text {
      margin: 0 0 1rem 0;
      color: #ddd;
      line-height: 1.4;
    }

    .confirm-input {
      width: 100%;
      box-sizing: border-box;
      padding: 0.6rem 0.7rem;
      border: 2px solid #333;
      border-radius: 6px;
      background: #121212;
      color: #eee;
      margin-bottom: 1rem;
    }

    .confirm-input:focus {
      outline: none;
      border-color: #387ff5;
    }

    .confirm-actions {
      display: flex;
      justify-content: flex-end;
      gap: 0.6rem;
    }

    .confirm-actions .danger-btn {
      background: #c62828;
    }

    .confirm-actions .danger-btn:hover {
      background: #b71c1c;
    }

    .confirm-actions .danger-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .close {
      position: absolute;
      top: 1rem;
      right: 1rem;
      font-size: 2rem;
      cursor: pointer;
      color: #f55;
      transition: color 0.2s ease;
    }

    .close:hover {
      color: #ff8888;
    }

    .user-list {
      list-style: none;
      padding: 0;
      margin: 0;
    }

    .user-list li {
      padding: 0.8rem;
      margin: 0.5rem 0;
      background: #121212;
      border-radius: 4px;
      cursor: pointer;
      transition: background 0.2s ease;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .user-list li:hover {
      background: #2a2a2a;
    }

    .user-entry {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
    }

    .user-status-dot {
      width: 0.6rem;
      height: 0.6rem;
      border-radius: 50%;
      display: inline-block;
      flex-shrink: 0;
    }

    .user-status-dot.online {
      background: #34c759;
    }

    .user-status-dot.offline {
      background: #ff3b30;
    }

    @keyframes slideIn {
      from { transform: translateY(-20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    #messages {
      flex: 1;
      background: #1e1e1e;
      border-radius: 6px;
      padding: 1rem;
      overflow-y: auto;
      opacity: 1;
      transition: opacity 0.3s ease;
      border: 1px solid #333;
      min-height: 0;
    }

    .message {
      margin: 0.4rem 0;
      padding: 0.3rem 0;
      animation: fadeIn 0.3s;
      line-height: 1.4;
      border-radius: 6px;
      cursor: pointer;
    }

    .message-jump-highlight {
      animation: jumpHighlight 1.1s ease;
    }

    @keyframes jumpHighlight {
      0% { background: rgba(56, 127, 245, 0.40); }
      100% { background: transparent; }
    }

    .message-user {
      cursor: pointer;
    }

    .message-user:hover {
      text-decoration: underline;
      text-decoration-thickness: 1px;
      text-underline-offset: 2px;
    }

    .user-quick-menu {
      position: fixed;
      min-width: 180px;
      background: #1e1e1e;
      border: 1px solid #387ff5;
      border-radius: 8px;
      padding: 0.65rem;
      box-shadow: 0 8px 22px rgba(0, 0, 0, 0.45);
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
      z-index: 2200;
      opacity: 0;
      transform: translateY(-6px) scale(0.98);
      pointer-events: none;
      transition: opacity 0.15s ease, transform 0.15s ease;
    }

    .user-quick-menu.show {
      opacity: 1;
      transform: translateY(0) scale(1);
      pointer-events: auto;
    }

    .user-quick-header {
      display: flex;
      align-items: center;
      gap: 0.55rem;
    }

    .user-quick-avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border: 1px solid #333;
      object-fit: cover;
      background: #111;
      flex-shrink: 0;
    }

    .user-quick-name {
      color: #eee;
      font-size: 0.9rem;
      font-weight: 600;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      max-width: 130px;
    }

    .user-quick-action {
      width: 100%;
      padding: 0.45rem 0.6rem;
      border: none;
      border-radius: 6px;
      background: #387ff5;
      color: #fff;
      font-size: 0.82rem;
      cursor: pointer;
      transition: background 0.2s ease;
    }

    .user-quick-action:hover {
      background: #2e6fd1;
    }

    .message-quick-menu {
      position: fixed;
      min-width: 165px;
      background: #1e1e1e;
      border: 1px solid #387ff5;
      border-radius: 8px;
      padding: 0.5rem;
      box-shadow: 0 8px 22px rgba(0, 0, 0, 0.45);
      display: flex;
      flex-direction: column;
      gap: 0.45rem;
      z-index: 2300;
      opacity: 0;
      transform: translateY(-6px) scale(0.98);
      pointer-events: none;
      transition: opacity 0.15s ease, transform 0.15s ease;
    }

    .message-quick-menu.show {
      opacity: 1;
      transform: translateY(0) scale(1);
      pointer-events: auto;
    }

    .message-quick-action {
      width: 100%;
      text-align: left;
      padding: 0.42rem 0.55rem;
      border: none;
      border-radius: 6px;
      background: #2a2a2a;
      color: #eee;
      font-size: 0.82rem;
      cursor: pointer;
    }

    .message-quick-action:hover {
      background: #387ff5;
    }

    .message-reply {
      margin-bottom: 0.2rem;
      border-left: 2px solid #4b4b4b;
      padding-left: 0.45rem;
      color: #a8a8a8;
      font-size: 0.82rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 100%;
      cursor: pointer;
    }

    .message-reply:hover {
      color: #d5d5d5;
      border-left-color: #7e7e7e;
    }

    .message-edited {
      color: #8f8f8f;
      font-size: 0.78rem;
      margin-left: 0.35rem;
    }

    .compose-context {
      margin-top: 0.75rem;
      border: 1px solid #333;
      border-radius: 6px;
      background: #171717;
      padding: 0.4rem 0.55rem;
      display: none;
      align-items: center;
      justify-content: space-between;
      gap: 0.75rem;
      color: #d0d0d0;
      font-size: 0.83rem;
    }

    #compose-context-text {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      flex: 1;
    }

    #compose-cancel {
      border: none;
      border-radius: 5px;
      background: #333;
      color: #fff;
      padding: 0.28rem 0.55rem;
      cursor: pointer;
      font-size: 0.78rem;
      flex-shrink: 0;
    }

    #compose-cancel:hover {
      background: #4d4d4d;
    }

    #input-area {
      display: flex;
      margin-top: 0.75rem;
      gap: 0.75rem;
    }

    #input {
      flex: 1;
      padding: 0.6rem 0.8rem;
      border: 2px solid transparent;
      border-radius: 6px;
      background: #1e1e1e;
      color: #eee;
      font-size: 0.95rem;
      transition: border-color 0.2s ease;
    }

    #input:focus {
      outline: none;
      border-color: #387ff5;
      background: #1e1e1e;
    }

    #send {
      padding: 0.6rem 1.5rem;
      border: none;
      border-radius: 6px;
      background: #387ff5;
      color: #fff;
      cursor: pointer;
      transition: all 0.2s ease;
      font-weight: 500;
      box-shadow: 0 2px 8px rgba(56, 127, 245, 0.2);
    }

    #send:hover {
      background: #2e6fd1;
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(56, 127, 245, 0.3);
    }

    #send:active {
      transform: translateY(0);
    }

    /* back button */
    .back-btn {
      position: fixed;
      bottom: 1rem;
      left: 1rem;
      padding: 0.6rem 1rem;
      background: #387ff5;
      color: #fff;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.2s ease;
      font-weight: bold;
      font-size: 0.9rem;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .back-btn:hover {
      background: #2e6fd1;
    }

    /* footer container */
    .footer-buttons {
      position: relative;
      margin-left: 0.5rem;
      display: flex;
      gap: 0.75rem;
      display: none;
      align-items: center;
    }

    .footer-buttons.show {
      display: flex;
    }

    .footer-btn {
      padding: 0.5rem 1rem;
      background: #387ff5;
      color: #fff;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      text-decoration: none;
      transition: all 0.2s ease;
      font-weight: 600;
      font-size: 0.85rem;
      white-space: nowrap;
      box-shadow: 0 2px 8px rgba(56, 127, 245, 0.2);
    }

    .footer-btn:hover {
      background: #2e6fd1;
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(56, 127, 245, 0.3);
    }

    /* header and user-info styling */
    .header {
      width: 90%;
      max-width: 800px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 0.6rem;
      gap: 1rem;
    }
    .header h1 {
      margin: 0;
      flex: 1;
    }
    .user-info {
      background: #1e1e1e;
      border: 2px solid #387ff5;
      border-radius: 6px;
      color: #eee;
      display: flex;
      flex-direction: grid;
      align-items: center;
      gap: 0.75rem;
      padding: 0.6rem 0.8rem;
      position: relative;
    }
    .user-info span {
      font-weight: bold;
      cursor: pointer;
      padding: 0.3rem 0.6rem;
      border-radius: 4px;
      transition: background 0.2s ease;
      flex-shrink: 0;
      font-size: 0.95rem;
    }
    .user-info span:hover {
      background: rgba(56, 127, 245, 0.2);
    }
    .user-actions {
      align-self: flex-end;
      display: inline-block;
      gap: 0.6rem;
      width: 100%;
      
      justify-content: center;
    }
    .user-display {
      display: grid;
      align-items: center;
      
      gap: 0.2rem;
    }

    .menu-btn, #logout-btn {
      padding: 0.4rem 0.7rem;
      font-size: 0.8rem;
      background: #387ff5;
      color: #fff;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      transition: all 0.2s ease;
      font-weight: 500;
    }
    .menu-btn:hover, #logout-btn:hover {
      background: #2e6fd1;
      transform: translateY(-1px);
    }
    /* user menu dropdown */
    .user-menu {
      display: flex;
      position: absolute;
      
      top: 100%;
      right: 0;
      background: #1e1e1e;
      border: 2px solid #387ff5;
      border-radius: 6px;
      margin-top: 0.75rem;
      min-width: 400px;
      padding: 1rem;
      z-index: 2001;
      flex-direction: column;
      gap: 0.8rem;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.5);
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
      transform: translateY(-8px) scale(0.98);
      transition: opacity 0.2s ease, transform 0.2s ease, visibility 0s linear 0.2s;
    }

    .user-menu.show {
      opacity: 1;
      visibility: visible;
      pointer-events: auto;
      transform: translateY(0) scale(1);
      transition: opacity 0.2s ease, transform 0.2s ease, visibility 0s linear 0s;
    }

    .user-menu h3 {
      margin: 0 0 0.5rem 0;
      font-size: 0.95rem;
      color: #eee;
      font-weight: 600;
    }

    .menu-section {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .menu-section label {
      font-size: 0.85rem;
      color: #aaa;
      font-weight: 600;
    }

    .color-picker-wrapper {
      display: flex;
      gap: 0.6rem;
      align-items: center;
    }

    .user-menu input[type="color"] {
      width: 50px;
      height: 36px;
      border: 2px solid #387ff5;
      border-radius: 4px;
      cursor: pointer;
    }

    .update-color-btn {
      padding: 0.4rem 0.75rem;
      font-size: 0.8rem;
      border-radius: 4px;
      color: #fff;
      border: none;
      cursor: pointer;
      background: #387ff5;
      transition: all 0.2s ease;
    }

    .update-color-btn:hover {
      background: #2e6fd1;
    }

    .color-value {
      font-size: 0.8rem;
      color: #aaa;
      flex-shrink: 0;
    }

    .user-menu input[type="password"],
    .user-menu input[type="text"] {
      padding: 0.5rem 0.6rem;
      border: 2px solid #333;
      border-radius: 4px;
      background: #121212;
      color: #eee;
      width: 100%;
      box-sizing: border-box;
      font-size: 0.85rem;
      transition: border-color 0.2s ease;
    }

    .user-menu input[type="password"]:focus,
    .user-menu input[type="text"]:focus {
      outline: none;
      border-color: #387ff5;
    }

    .user-menu button {
      padding: 0.5rem;
      background: #387ff5;
      color: #fff;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 0.85rem;
      font-weight: 500;
      transition: all 0.2s ease;
    }

    .user-menu button:hover {
      background: #2e6fd1;
      transform: translateY(-1px);
    }

    .user-menu button.danger-btn {
      background: #c62828;
    }

    .user-menu button.danger-btn:hover {
      background: #b71c1c;
    }

    /* badge for new private messages */
    .badge {
      position: absolute;
      top: -6px;
      right: -8px;
      background: #f55;
      color: #fff;
      padding: 0 6px;
      border-radius: 12px;
      font-size: 0.75rem;
      line-height: 20px;
      display: none;
    }

    .chat-count {
      background: #f55;
      color: #fff;
      padding: 0 8px;
      border-radius: 12px;
      font-size: 0.85rem;
      margin-left: 0.5rem;
      min-width: 28px;
      text-align: center;
    }

    .password-section {
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
    }

    .delete-account-confirm {
      display: none;
      flex-direction: column;
      gap: 0.5rem;
      margin-top: 0.35rem;
      padding: 0.55rem;
      border: 1px solid #3a3a3a;
      border-radius: 6px;
      background: #171717;
    }

    .delete-account-confirm .confirm-actions {
      margin-top: 0.15rem;
    }

    .confirm-check-row {
      display: flex;
      align-items: center;
      gap: 0.45rem;
      font-size: 0.9rem;
      color: #ddd;
    }

    .confirm-check-row input[type="checkbox"] {
      margin: 0;
      width: 15px;
      height: 15px;
      accent-color: #d63c3c;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(5px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 600px) {
      h1 {
        margin-top: 0;
        font-size: clamp(1.15rem, 5vw, 1.45rem);
        letter-spacing: 0.5px;
      }

      .header {
        width: 94%;
        margin-top: 0.4rem;
        gap: 0.4rem;
        align-items: stretch;
      }

      .footer-buttons {
        width: auto;
        margin-left: 0;
        justify-content: flex-start;
      }

      .footer-btn {
        padding: 0.3rem 0.55rem;
        font-size: 0.7rem;
      }

      .mode-buttons {
        grid-template-columns: 1fr 1fr;
        gap: 0.5rem;
        margin-bottom: 0.6rem;
      }

      .mode-btn {
        padding: 0.5rem;
        font-size: 0.82rem;
      }

      .top-buttons {
        grid-template-columns: 1fr 1fr;
        gap: 0.4rem;
        margin-bottom: 0.5rem;
      }

      .top-btn {
        padding: 0.42rem 0.5rem;
        font-size: 0.74rem;
      }

      #input-area {
        flex-direction: row;
        gap: 0.45rem;
        margin-top: 0.5rem;
        padding-bottom: calc(env(safe-area-inset-bottom) + var(--keyboard-inset));
        transition: padding-bottom 0.2s ease;
      }

      #input {
        width: 100%;
        min-width: 0;
        padding: 0.5rem 0.65rem;
        font-size: 0.84rem;
      }

      #send {
        padding: 0.48rem 0.8rem;
        font-size: 0.8rem;
        flex-shrink: 0;
      }

      .container {
        width: 94%;
      }

      #auth {
        margin-top: 0.5rem;
      }

      form {
        gap: 0.5rem;
      }

      input[type="text"],
      input[type="password"] {
        padding: 0.5rem 0.65rem;
        font-size: 0.84rem;
      }

      button {
        padding: 0.52rem;
        font-size: 0.84rem;
      }

      .user-info {
        flex-direction: row;
        align-items: center;
        justify-content: space-between;
        gap: 0.45rem;
        padding: 0.35rem 0.45rem;
        width: 100%;
        box-sizing: border-box;
      }

      .user-info span {
        padding: 0.2rem 0.4rem;
        font-size: 0.78rem;
      }

      .user-actions {
        width: auto;
        gap: 0.4rem;
      }

      .menu-btn, #logout-btn {
        padding: 0.3rem 0.45rem;
        font-size: 0.72rem;
      }

      .chat-mode-indicator {
        padding: 0.42rem 0.5rem;
        font-size: 0.74rem;
      }

      #messages {
        padding: 0.6rem;
      }

      .user-menu {
        right: 0;
        min-width: min(92vw, 300px);
        max-width: min(92vw, 300px);
        padding: 0.75rem;
        gap: 0.6rem;
      }
    }

    /* toast notification */
    .toast {
      position: fixed;
      top: 1rem;
      left: 50%;
      transform: translateX(-50%);
      background: #333;
      color: #fff;
      padding: 0.8rem 1rem;
      border: 2px solid #387ff5;
      border-radius: 4px;
      opacity: 0;
      transition: opacity 0.3s ease;
      z-index: 2000;
      cursor: pointer;
      animation: slideDown 0.4s ease;
    }
    .toast.show {
      opacity: 1;
    }

    @keyframes slideDown {
      from { transform: translate(-50%, -20px); opacity: 0; }
      to { transform: translate(-50%, 0); opacity: 1; }
    }

    /* fade utility for chat messages */
    #messages.fading {
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .user-info{
      display:flex;
      align-items:center;
      gap:8px;
    }

    #userAvatar{
      width:36px;
      height:36px;
      border-radius:50%;
      object-fit:cover;
      border:2px solid #444;
    }
  </style>
</head>
<body>
  <div id="loader">
    <div class="spinner"></div>
  </div>
  <header class="header">
    <h1>Dark Chat</h1>
    
    
    <div id="user-info" class="user-info" style="display: none;">
      <div class="user-display"> 
        <span id="username-display"></span>
        <img id="userAvatar" src="/avatars/default.webp">
      </div> 
      <div class="user-actions"> 
        <a href="/index.html" class="footer-btn">🏠 Home</a>
        <button id="logout-btn">🚪logout</button>
        <button class="menu-btn" id="menu-btn">⋯ mehr</button>
      </div>
      <div id="user-menu" class="user-menu">
        <!-- menu content added dynamically -->
      </div>
    </div>
  </header>
  <div class="container">
    <div id="auth">
      <div id="error"></div>
      
      <!-- Mode selection buttons -->
      <div class="mode-buttons">
        <button class="mode-btn" id="login-mode-btn">Login</button>
        <button class="mode-btn" id="register-mode-btn">Registrieren</button>
      </div>

      <!-- Login form -->
      <form id="login-form">
        <input id="login-user" type="text" placeholder="Benutzername" required />
        <input id="login-pass" type="password" placeholder="Passwort" required />
        <label style="font-size:0.80rem; display:flex; gap:0.2rem;">
          <input type="checkbox" id="remember-me" /> Angemeldet bleiben
        </label>
        <button type="submit">Anmelden</button>
      </form>

      <!-- Register form -->
      <form id="register-form">
        <input id="reg-user" type="text" placeholder="Neuer Benutzername" required />
        <input id="reg-pass" type="password" placeholder="Passwort" required />
        <button type="submit">Registrieren</button>
      </form>

      <!-- Guest button always visible -->
      <button id="guest-btn">Als Gast beitreten</button>
    </div>

    <div id="chat">
      <div class="top-buttons">
        <button class="top-btn" id="registered-users-btn">👤 Benutzer</button>
        <button class="top-btn" id="private-chats-btn">💬 Chats</button>
        <div class="chat-mode-indicator" id="chat-mode">Öffentlicher Chat</div>
      </div>
      <div id="messages"></div>
      <div id="compose-context" class="compose-context">
        <div id="compose-context-text"></div>
        <button id="compose-cancel" type="button">Abbrechen</button>
      </div>
      <div id="input-area">
        <input id="input" type="text" placeholder="Nachricht eingeben" autocomplete="off" />
        <button id="send">Senden</button>
      </div>
    </div>
  </div>

  <!-- Private Chats Modal -->
  <div id="private-chats-modal" class="modal">
    <div class="modal-content">
      <span class="close" id="close-private-chats">&times;</span>
      <h2>Private Chats</h2>
      <ul id="private-chats-list" class="user-list"></ul>
      <button id="back-to-public-btn" style="width: 100%; margin-top: 1rem;">&#128072; Zurück zum öffentlichen Chat</button>
    </div>
  </div>

  <!-- Registered Users Modal -->
  <div id="registered-users-modal" class="modal">
    <div class="modal-content">
      <span class="close" id="close-registered-users">&times;</span>
      <h2>Registrierte Benutzer</h2>
      <ul id="registered-users-list" class="user-list"></ul>
    </div>
  </div>

  <!-- footer moved into header -->

  <script>
    // Backend configuration
    // the backend is served under "/chat" on the DDNS host
    const BACKEND_URL = 'https://chriss97st.ddns.net/chat';
    const WS_URL = 'wss://chriss97st.ddns.net/chat';

    let ws;
    let currentUser;
    let currentToken;
    let currentUserColor = "#ffffff";
    let currentUserIsGuest = false;
    let userColorCache = {};  // cache {username: color} to avoid repeated requests
    let activeMode = null;
    let currentChat = null; // null = public, username = private chat
    let privateChats = new Set(); // usernames we have private chats with
    let unreadCounts = {}; // {username: count}
    let activeUserQuickMenu = null;
    let activeMessageQuickMenu = null;
    let deletedUsers = new Set();
    let messageLookup = new Map();
    let pendingReply = null;
    let pendingEdit = null;

    function getDisplayUsername(username) {
      if (!username) return '';
      return deletedUsers.has(username) ? `${username} (gelöscht)` : username;
    }

    async function refreshDeletedUsers() {
      try {
        const res = await fetch(BACKEND_URL + '/deleted-users');
        const data = await res.json();
        deletedUsers = new Set(data.users || []);
      } catch (e) {
        console.warn('Failed to load deleted users', e);
      }
    }

    function updateKeyboardInset() {
      const root = document.documentElement;
      if (!window.visualViewport) {
        root.style.setProperty('--keyboard-inset', '0px');
        return;
      }
      const vv = window.visualViewport;
      const inset = Math.max(0, window.innerHeight - vv.height - vv.offsetTop);
      root.style.setProperty('--keyboard-inset', `${Math.round(inset)}px`);
    }

    updateKeyboardInset();
    if (window.visualViewport) {
      window.visualViewport.addEventListener('resize', updateKeyboardInset);
      window.visualViewport.addEventListener('scroll', updateKeyboardInset);
    }
    window.addEventListener('resize', updateKeyboardInset);
    window.addEventListener('orientationchange', updateKeyboardInset);

    // Klick auf verstecktes File-Input
    function selectAvatar(){
        document.getElementById("avatarUpload").click();
    }

    function updateAvatar() {
        if (!currentUser) return;
        const avatarImg = document.getElementById("userAvatar");
        avatarImg.src = `/user-avatar/${currentUser}?` + Date.now();
    }

    // Upload-Funktion
    async function uploadAvatar(){
        const fileInput = document.getElementById("avatarUpload");
        const file = fileInput.files[0];
        if(!file) return;

        if(!currentUser){
            showToast("Du bist nicht eingeloggt.");
            return;
        }

        const formData = new FormData();
        formData.append("file", file);

        try {
            const response = await fetch(`/upload-avatar/${currentUser}`, {
                method: "POST",
                body: formData
            });

            const result = await response.json();
            if(result.success){
                // Verwende die URL vom Backend
                document.getElementById("userAvatar").src = result.avatar + '?' + Date.now();
            } else {
                showToast("Avatar konnte nicht hochgeladen werden.");
            }
        } catch (err) {
            console.error(err);
            showToast("Fehler beim Upload.");
        }
    }

    window.addEventListener("load", () => {
        // Benutzername anzeigen
        document.getElementById("username-display").textContent = currentUser;

        // Benutzer-Avatar laden
        const avatarImg = document.getElementById("userAvatar");
        avatarImg.src = `/user-avatar/${currentUser}?` + Date.now();

        // FileInput Eventlistener
        const avatarInput = document.getElementById("avatarUpload");
        if (avatarInput) {
            avatarInput.addEventListener("change", uploadAvatar);
        }
    });

    function updatePrivateChatsBadge() {
      const btn = document.getElementById('private-chats-btn');
      if (!btn) return;
      const total = Object.values(unreadCounts).reduce((a, b) => a + (b || 0), 0);
      let badge = btn.querySelector('.badge');
      if (!badge) {
        badge = document.createElement('span');
        badge.className = 'badge';
        btn.appendChild(badge);
      }
      if (total > 0) {
        badge.textContent = total;
        badge.style.display = 'inline-block';
      } else {
        badge.style.display = 'none';
      }
    }

    async function getUserColor(username) {
      if (deletedUsers.has(username)) {
        return "#888888";
      }
      if (username === currentUser) {
        return currentUserColor;
      }
      if (userColorCache[username]) {
        return userColorCache[username];
      }
      try {
        const res = await fetch(BACKEND_URL + '/user-color/' + encodeURIComponent(username));
        const data = await res.json();
        userColorCache[username] = data.color;
        return data.color;
      } catch (e) {
        return "#ffffff";
      }
    }

    function truncateSnippet(text, maxLen = 65) {
      const value = (text || '').replace(/\s+/g, ' ').trim();
      return value.length > maxLen ? value.slice(0, maxLen - 1) + '…' : value;
    }

    function parseServerTimestamp(ts) {
      if (!ts) return new Date(0);
      if (/[zZ]$|[+\-]\d{2}:\d{2}$/.test(ts)) return new Date(ts);
      return new Date(ts + 'Z');
    }

    function isWithinEditWindow(message) {
      if (!message || message.username !== currentUser || !message.timestamp) return false;
      return (Date.now() - parseServerTimestamp(message.timestamp).getTime()) <= (30 * 60 * 1000);
    }

    function getRemainingEdits(message) {
      if (!message) return 0;
      if (typeof message.remaining_edits === 'number') return Math.max(0, message.remaining_edits);
      const used = Number(message.edit_count || 0);
      return Math.max(0, 2 - used);
    }

    function canEditMessage(message) {
      return !!message && message.username === currentUser && isWithinEditWindow(message) && getRemainingEdits(message) > 0;
    }

    function messageBelongsToCurrentView(message) {
      if (!message) return false;
      if (currentChat === null) return message.target_user === null;
      return (
        (message.username === currentUser && message.target_user === currentChat) ||
        (message.username === currentChat && message.target_user === currentUser)
      );
    }

    function getPrivatePeer(message) {
      if (!message || message.target_user === null) return null;
      return message.username === currentUser ? message.target_user : message.username;
    }

    function jumpToMessage(messageId) {
      if (!messageId) return;
      const node = document.querySelector(`#messages [data-message-id="${messageId}"]`);
      if (!node) {
        showToast('Originalnachricht ist im aktuellen Verlauf nicht sichtbar.');
        return;
      }
      node.scrollIntoView({ behavior: 'smooth', block: 'center' });
      node.classList.remove('message-jump-highlight');
      void node.offsetWidth;
      node.classList.add('message-jump-highlight');
      setTimeout(() => node.classList.remove('message-jump-highlight'), 1200);
    }

    function resetComposeState() {
      pendingReply = null;
      pendingEdit = null;
      const ctx = document.getElementById('compose-context');
      const txt = document.getElementById('compose-context-text');
      txt.textContent = '';
      ctx.style.display = 'none';
    }

    function setReplyTarget(message) {
      pendingEdit = null;
      pendingReply = message;
      const ctx = document.getElementById('compose-context');
      const txt = document.getElementById('compose-context-text');
      txt.textContent = `Antwort an ${getDisplayUsername(message.username)}: ${truncateSnippet(message.content)}`;
      ctx.style.display = 'flex';
      document.getElementById('input').focus();
    }

    function setEditTarget(message) {
      pendingReply = null;
      pendingEdit = message;
      const ctx = document.getElementById('compose-context');
      const txt = document.getElementById('compose-context-text');
      txt.textContent = `Bearbeite Nachricht: ${truncateSnippet(message.content)}`;
      ctx.style.display = 'flex';
      const input = document.getElementById('input');
      input.value = message.content || '';
      input.focus();
    }

    async function renderMessageWithColor(message) {
      const div = document.createElement('div');
      div.className = 'message';
      div.dataset.messageId = String(message.id);
      const color = await getUserColor(message.username);
      const time = parseServerTimestamp(message.timestamp).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit', hour12: false});

      if (message.reply_to) {
        const reply = document.createElement('div');
        reply.className = 'message-reply';
        reply.textContent = `↪ ${getDisplayUsername(message.reply_to.username)}: ${truncateSnippet(message.reply_to.content)}`;
        reply.title = 'Zur Originalnachricht springen';
        reply.addEventListener('click', (e) => {
          e.stopPropagation();
          jumpToMessage(message.reply_to.id);
        });
        div.appendChild(reply);
      }

      const line = document.createElement('div');

      const timeSpan = document.createElement('span');
      timeSpan.textContent = time + ' ';
      timeSpan.style.color = '#aaa';

      const userSpan = document.createElement('span');
      userSpan.textContent = getDisplayUsername(message.username) + ': ';
      userSpan.style.color = color;
      userSpan.style.fontWeight = 'bold';
      userSpan.className = 'message-user';
      userSpan.addEventListener('click', (e) => {
        e.stopPropagation();
        showUserQuickMenu(message.username, userSpan);
      });

      const contentSpan = document.createElement('span');
      contentSpan.textContent = message.content;

      line.appendChild(timeSpan);
      line.appendChild(userSpan);
      line.appendChild(contentSpan);

      if (message.edited_at) {
        const edited = document.createElement('span');
        edited.className = 'message-edited';
        edited.textContent = '(bearbeitet)';
        line.appendChild(edited);
      }

      div.appendChild(line);
      div.addEventListener('click', (e) => {
        e.stopPropagation();
        showMessageQuickMenu(message, div);
      });
      return div;
    }

    function closeUserQuickMenu() {
      if (!activeUserQuickMenu) return;
      activeUserQuickMenu.remove();
      activeUserQuickMenu = null;
    }

    function showUserQuickMenu(username, anchorEl) {
      closeUserQuickMenu();

      const menu = document.createElement('div');
      menu.className = 'user-quick-menu';

      const header = document.createElement('div');
      header.className = 'user-quick-header';

      const avatar = document.createElement('img');
      avatar.className = 'user-quick-avatar';
      avatar.src = `/user-avatar/${encodeURIComponent(username)}?${Date.now()}`;
      avatar.alt = `Avatar von ${username}`;

      const name = document.createElement('div');
      name.className = 'user-quick-name';
      name.textContent = getDisplayUsername(username);

      const actionBtn = document.createElement('button');
      actionBtn.className = 'user-quick-action';
      actionBtn.type = 'button';
      actionBtn.textContent = 'Privaten Chat öffnen';
      if (username === currentUser) {
        actionBtn.textContent = 'Das bist du';
        actionBtn.disabled = true;
        actionBtn.style.opacity = '0.6';
        actionBtn.style.cursor = 'not-allowed';
      } else if (deletedUsers.has(username)) {
        actionBtn.textContent = 'Account gelöscht';
        actionBtn.disabled = true;
        actionBtn.style.opacity = '0.6';
        actionBtn.style.cursor = 'not-allowed';
      }

      header.appendChild(avatar);
      header.appendChild(name);
      menu.appendChild(header);
      menu.appendChild(actionBtn);

      menu.addEventListener('click', (e) => e.stopPropagation());
      document.body.appendChild(menu);

      const rect = anchorEl.getBoundingClientRect();
      const menuRect = menu.getBoundingClientRect();
      const margin = 8;
      let left = rect.left;
      let top = rect.bottom + 6;

      if (left + menuRect.width > window.innerWidth - margin) {
        left = window.innerWidth - menuRect.width - margin;
      }
      if (top + menuRect.height > window.innerHeight - margin) {
        top = rect.top - menuRect.height - 6;
      }
      if (left < margin) left = margin;
      if (top < margin) top = margin;

      menu.style.left = `${left}px`;
      menu.style.top = `${top}px`;

      actionBtn.addEventListener('click', () => {
        if (username === currentUser || deletedUsers.has(username)) return;
        closeUserQuickMenu();
        openPrivateChat(username);
      });

      requestAnimationFrame(() => menu.classList.add('show'));
      activeUserQuickMenu = menu;
    }

    function closeMessageQuickMenu() {
      if (!activeMessageQuickMenu) return;
      activeMessageQuickMenu.remove();
      activeMessageQuickMenu = null;
    }

    function showMessageQuickMenu(message, anchorEl) {
      closeMessageQuickMenu();

      const menu = document.createElement('div');
      menu.className = 'message-quick-menu';

      const replyBtn = document.createElement('button');
      replyBtn.type = 'button';
      replyBtn.className = 'message-quick-action';
      replyBtn.textContent = 'Antworten';
      replyBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        closeMessageQuickMenu();
        setReplyTarget(message);
      });
      menu.appendChild(replyBtn);

      if (canEditMessage(message)) {
        const editBtn = document.createElement('button');
        editBtn.type = 'button';
        editBtn.className = 'message-quick-action';
        editBtn.textContent = 'Bearbeiten';
        editBtn.addEventListener('click', (e) => {
          e.stopPropagation();
          closeMessageQuickMenu();
          setEditTarget(message);
        });
        menu.appendChild(editBtn);
      }

      menu.addEventListener('click', (e) => e.stopPropagation());
      document.body.appendChild(menu);

      const rect = anchorEl.getBoundingClientRect();
      const menuRect = menu.getBoundingClientRect();
      const margin = 8;
      let left = rect.left;
      let top = rect.bottom + 6;

      if (left + menuRect.width > window.innerWidth - margin) {
        left = window.innerWidth - menuRect.width - margin;
      }
      if (top + menuRect.height > window.innerHeight - margin) {
        top = rect.top - menuRect.height - 6;
      }
      if (left < margin) left = margin;
      if (top < margin) top = margin;

      menu.style.left = `${left}px`;
      menu.style.top = `${top}px`;

      requestAnimationFrame(() => menu.classList.add('show'));
      activeMessageQuickMenu = menu;
    }

    async function upsertMessageInCurrentView(message, scrollToBottom = true) {
      if (!message) return;
      messageLookup.set(message.id, message);
      if (!messageBelongsToCurrentView(message)) return;

      const messages = document.getElementById('messages');
      const old = messages.querySelector(`[data-message-id="${message.id}"]`);
      const newNode = await renderMessageWithColor(message);
      if (old) {
        old.replaceWith(newNode);
      } else {
        messages.appendChild(newNode);
      }
      if (scrollToBottom) {
        messages.scrollTop = messages.scrollHeight;
      }
    }

    async function handleIncomingMessage(message) {
      if (!message) return;
      const peer = getPrivatePeer(message);
      if (peer) {
        privateChats.add(peer);
      }

      if (messageBelongsToCurrentView(message)) {
        await upsertMessageInCurrentView(message, true);
        return;
      }

      if (peer && message.username !== currentUser) {
        unreadCounts[peer] = (unreadCounts[peer] || 0) + 1;
        updatePrivateChatsBadge();
        const saved = localStorage.getItem('chatSession');
        if (saved) {
          try {
            const obj = JSON.parse(saved);
            obj.unreadCounts = unreadCounts;
            obj.privateChats = Array.from(privateChats);
            localStorage.setItem('chatSession', JSON.stringify(obj));
          } catch (e) {
            console.warn('Failed to save unread/private state', e);
          }
        }
        showToast(`Nachricht v.: ${getDisplayUsername(peer)}`, peer);
      }
    }

    function showError(msg) {
      document.getElementById('error').textContent = msg;
    }

    async function loadPeers() {
      if (!currentUser) return;
      try {
        const res = await fetch(BACKEND_URL + '/peers?username=' + encodeURIComponent(currentUser));
        const data = await res.json();
        data.peers.forEach(u => privateChats.add(u));
        // persist updated privateChats
        const saved = localStorage.getItem('chatSession');
        if (saved) {
          try {
            const obj = JSON.parse(saved);
            obj.privateChats = Array.from(privateChats);
            localStorage.setItem('chatSession', JSON.stringify(obj));
          } catch (e) {
            console.warn('Failed to save private chats', e);
          }
        }
      } catch (e) {
        console.warn('Failed to load peers', e);
      }
    }

    function showUserInfo() {
      const info = document.getElementById('user-info');
      const display = document.getElementById('username-display');
      display.textContent = currentUser;
      display.style.color = currentUserColor;
      info.style.display = 'flex';
      updateAvatar();
      buildUserMenu();
    }

    function buildUserMenu() {
      const menu = document.getElementById('user-menu');
      menu.innerHTML = '';
      
      if (currentUserIsGuest) {
        // Guest: show password registration option
         menu.innerHTML = `
          <div class="menu-section">
            <h3>Account registrieren</h3>
            <input type="password" id="guest-pass" placeholder="Neues Passwort" />
            <button id="register-guest-btn">Account sichern</button>
          </div>
        `;
        document.getElementById('register-guest-btn').addEventListener('click', registerGuest);
        } else {
        // Registered: show color picker and expandable password change + delete option
        menu.innerHTML = `
          <div class="menu-section">
            <label>Namensfarbe</label>
            <div class="color-picker-wrapper">
              <input type="color" id="color-picker" value="${currentUserColor}" />
              <span class="color-value" id="color-value">${currentUserColor}</span>
              <button id="update-color-btn" class="update-color-btn">Speichern</button>
            </div>
          </div>
          <div class="menu-section">
            <input type="file" id="avatarUpload" style="display:none" accept="image/*">
            <button onclick="selectAvatar()">Avatar ändern</button>
          </div>
           <div class="menu-section">
            <button id="toggle-password-btn">Passwort ändern</button>
            <div id="password-section" style="display: none;" class="password-section">
              <input type="password" id="old-pass" placeholder="Altes Passwort" />
              <input type="password" id="new-pass" placeholder="Neues Passwort" />
              <button id="change-pass-btn">Ändern</button>
            </div>
          </div>
          <div class="menu-section">
            <button id="delete-account-btn" class="danger-btn">Account löschen...</button>
            <div id="delete-account-confirm" class="delete-account-confirm">
              <p id="delete-account-confirm-text" class="confirm-text"></p>
              <label class="confirm-check-row">
                <input id="delete-account-confirm-check" type="checkbox" />
                <span>Account >endgültig< löschen.</span>
              </label>
              <input id="delete-account-confirm-password" class="confirm-input" type="password" placeholder="Passwort" style="display:none" />
              <div class="confirm-actions">
                <button id="delete-account-cancel-btn" type="button">Abbrechen</button>
                <button id="delete-account-confirm-btn" type="button" class="danger-btn" disabled>Account löschen</button>
              </div>
            </div>          
          </div>
        `;

        const colorPicker = document.getElementById('color-picker');
        const colorValue = document.getElementById('color-value');

        document.getElementById('update-color-btn').addEventListener('click', updateUserColor);
        colorPicker.addEventListener('change', (e) => {
          colorValue.textContent = e.target.value;
        });

        document.getElementById('toggle-password-btn').addEventListener('click', () => {
          const section = document.getElementById('password-section');
          section.style.display = section.style.display === 'none' ? 'flex' : 'none';
        });

        document.getElementById('change-pass-btn').addEventListener('click', changePassword);
        document.getElementById('delete-account-btn').addEventListener('click', deleteAccount);
        document.getElementById('delete-account-cancel-btn').addEventListener('click', cancelDeleteAccountFlow);
        document.getElementById('delete-account-confirm-btn').addEventListener('click', confirmDeleteAccountFlow);
        document.getElementById('delete-account-confirm-check').addEventListener('change', updateDeleteAccountConfirmState);
        document.getElementById('delete-account-confirm-password').addEventListener('input', updateDeleteAccountConfirmState);
      }
    }

    async function changePassword() {
      const oldPass = document.getElementById('old-pass').value;
      const newPass = document.getElementById('new-pass').value;
      if (!oldPass || !newPass) {
        alert('Beide Passwörter erforderlich');
        return;
      }
      try {
        await fetch(BACKEND_URL + '/change-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username: currentUser, old_password: oldPass, new_password: newPass }),
        });
        showError('Passwort erfolgreich geändert!');
        document.getElementById('old-pass').value = '';
        document.getElementById('new-pass').value = '';
        setTimeout(() => showError(''), 2000);
      } catch (e) {
        showError('Fehler: ' + e.message);
      }
    }

    async function registerGuest() {
      const password = document.getElementById('guest-pass').value;
      if (!password) {
        alert('Passwort erforderlich');
        return;
      }
      try {
        await fetch(BACKEND_URL + '/register-guest', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username: currentUser, password: password }),
        });
        currentUserIsGuest = false;
        buildUserMenu();
        showError('Account erfolgreich registriert!');
        setTimeout(() => showError(''), 2000);
      } catch (e) {
        showError('Fehler: ' + e.message);
      }
    }

    function deleteAccount() {
      const box = document.getElementById('delete-account-confirm');
      const text = document.getElementById('delete-account-confirm-text');
      const check = document.getElementById('delete-account-confirm-check');
      const pass = document.getElementById('delete-account-confirm-password');
      const confirmBtn = document.getElementById('delete-account-confirm-btn');
      const toggleBtn = document.getElementById('delete-account-btn');
      if (!box || !text || !check || !pass || !confirmBtn || !toggleBtn) return;

      const open = box.style.display !== 'flex';
      if (!open) {
        cancelDeleteAccountFlow();
        return;
      }

      box.style.display = 'flex';
      text.textContent = currentUserIsGuest
        ? 'Löschung kann nicht rückgängig gemacht werden.'
        : 'Löschung ist endgültig. Passwort eingeben.';
      check.checked = false;
      pass.style.display = currentUserIsGuest ? 'none' : 'block';
      pass.value = '';
      confirmBtn.disabled = true;
      toggleBtn.textContent = 'Löschen verbergen';
      updateDeleteAccountConfirmState();
      if (!currentUserIsGuest) setTimeout(() => pass.focus(), 20);
    }

    function cancelDeleteAccountFlow() {
      const box = document.getElementById('delete-account-confirm');
      const check = document.getElementById('delete-account-confirm-check');
      const pass = document.getElementById('delete-account-confirm-password');
      const confirmBtn = document.getElementById('delete-account-confirm-btn');
      const toggleBtn = document.getElementById('delete-account-btn');
      if (!box || !check || !pass || !confirmBtn || !toggleBtn) return;
      box.style.display = 'none';
      check.checked = false;
      pass.value = '';
      pass.style.display = 'none';
      confirmBtn.disabled = true;
      toggleBtn.textContent = 'Account löschen...';
    }

    function updateDeleteAccountConfirmState() {
      const check = document.getElementById('delete-account-confirm-check');
      const pass = document.getElementById('delete-account-confirm-password');
      const confirmBtn = document.getElementById('delete-account-confirm-btn');
      if (!check || !pass || !confirmBtn) return;

      const hasPassword = currentUserIsGuest || pass.value.trim().length > 0;
      confirmBtn.disabled = !(check.checked && hasPassword);
    }

    async function confirmDeleteAccountFlow() {
      const box = document.getElementById('delete-account-confirm');
      const text = document.getElementById('delete-account-confirm-text');
      const check = document.getElementById('delete-account-confirm-check');
      const pass = document.getElementById('delete-account-confirm-password');
      const confirmBtn = document.getElementById('delete-account-confirm-btn');
      if (!box || !text || !check || !pass || !confirmBtn || !currentUser) return;

      if (!check.checked) {
        showError('Bitte das Bestätigungsfeld aktivieren.');
        return;
      }

      const password = currentUserIsGuest ? '' : pass.value;
      if (!currentUserIsGuest && !password.trim()) {
        showError('Passwort erforderlich.');
        return;
          showError('Passwort erforderlich.');
          return;
        }

      try {
        const res = await fetch(BACKEND_URL + '/delete-account', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username: currentUser, password: password }),
        });
        const data = await res.json();
        if (!res.ok) {
          throw new Error(data.detail || 'Account konnte nicht gelöscht werden');
        }

        deletedUsers.add(currentUser);
        closeUserQuickMenu();
        showError('Account wurde gelöscht.');
        document.getElementById('logout-btn').click();
      } catch (e) {
        showError('Fehler: ' + e.message);
      }
    }

    async function updateUserColor() {
      const color = document.getElementById('color-picker').value;
      try {
        await fetch(BACKEND_URL + '/update-color', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username: currentUser, color: color }),
        });
        currentUserColor = color;
        document.getElementById('username-display').style.color = currentUserColor;
        // Update localStorage if session is saved
        const saved = localStorage.getItem('chatSession');
        if (saved) {
          const obj = JSON.parse(saved);
          obj.color = color;
          localStorage.setItem('chatSession', JSON.stringify(obj));
        }
        document.getElementById('user-menu').classList.remove('show');
        showError('Farbe gespeichert!');
        setTimeout(() => showError(''), 2000);
      } catch (e) {
        showError('Fehler: ' + e.message);
      }
    }

    function showToast(message, user) {
      const toast = document.createElement('div');
      toast.className = 'toast';
      toast.textContent = message;
      if (user) {
        toast.dataset.user = user;
        toast.addEventListener('click', () => {
          openPrivateChat(user);
          toast.remove();
        });
      }
      document.body.appendChild(toast);
      // trigger show after insertion
      setTimeout(() => toast.classList.add('show'), 10);
      // remove after a few seconds unless clicked
      const hide = () => {
        toast.classList.remove('show');
        setTimeout(() => toast.remove(), 300);
      };
      setTimeout(hide, 4000);
    }

    function setMode(mode) {
      activeMode = mode;
      
      // Update button styles
      const loginBtn = document.getElementById('login-mode-btn');
      const registerBtn = document.getElementById('register-mode-btn');
      
      if (mode === 'login') {
        loginBtn.classList.add('active');
        registerBtn.classList.remove('active');
        document.getElementById('login-form').classList.add('active');
        document.getElementById('register-form').classList.remove('active');
      } else if (mode === 'register') {
        registerBtn.classList.add('active');
        loginBtn.classList.remove('active');
        document.getElementById('register-form').classList.add('active');
        document.getElementById('login-form').classList.remove('active');
      }
    }

    async function request(path, body) {
      const res = await fetch(BACKEND_URL + path, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body),
      });
      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        throw new Error(err.detail || res.statusText);
      }
      return res.json();
    }

    async function loadHistory(peer) {
      const messages = document.getElementById('messages');
      // fade out, then load
      messages.classList.add('fading');
      closeMessageQuickMenu();
      resetComposeState();
      try {
        let url = BACKEND_URL + '/history?username=' + encodeURIComponent(currentUser);
        if (peer) url += '&peer=' + encodeURIComponent(peer);
        const res = await fetch(url);
        const data = await res.json();
        messages.innerHTML = '';
        messageLookup = new Map();
        for (const m of data) {
          messageLookup.set(m.id, m);
          const messageDiv = await renderMessageWithColor(m);
          messages.appendChild(messageDiv);
        }
        messages.scrollTop = messages.scrollHeight;
      } catch (e) {
        console.error('history error', e);
      }
      // fade back in
      setTimeout(() => messages.classList.remove('fading'), 50);
    }

    // Toggle user menu on more button click
    document.getElementById('menu-btn').addEventListener('click', (e) => {
      e.stopPropagation();
      const menu = document.getElementById('user-menu');
      menu.classList.toggle('show');
    });

    // Close menu when clicking outside
    document.addEventListener('click', () => {
      document.getElementById('user-menu').classList.remove('show');
      closeUserQuickMenu();
      closeMessageQuickMenu();
    });

    // Close menu when clicking inside it (prevent bubbling)
    document.getElementById('user-menu').addEventListener('click', (e) => {
      e.stopPropagation();
    });

    document.getElementById('messages').addEventListener('scroll', () => {
      closeUserQuickMenu();
      closeMessageQuickMenu();
    });
    window.addEventListener('resize', () => {
      closeUserQuickMenu();
      closeMessageQuickMenu();
    });

    // Mode buttons
    document.getElementById('login-mode-btn').addEventListener('click', () => setMode('login'));
    document.getElementById('register-mode-btn').addEventListener('click', () => setMode('register'));

    // Login form submit
    document.getElementById('login-form').addEventListener('submit', async e => {
      e.preventDefault();
      try {
        const data = await request('/login', {
          username: document.getElementById('login-user').value,
          password: document.getElementById('login-pass').value,
        });
        currentUser = data.username;
        currentToken = data.access_token;
        currentUserColor = data.color || "#ffffff";
        currentUserIsGuest = false;

        updateAvatar();
        const remember = document.getElementById('remember-me').checked;
        if (remember) {
          localStorage.setItem('chatSession', JSON.stringify({
            username: currentUser,
            token: currentToken,
            color: currentUserColor,
            privateChats: Array.from(privateChats),
            unreadCounts: unreadCounts
          }));
        } else {
          localStorage.removeItem('chatSession');
        }
        startChat();
        showUserInfo();
      } catch (err) {
        showError(err.message);
      }
    });

    // Register form submit
    document.getElementById('register-form').addEventListener('submit', async e => {
      e.preventDefault();
      try {
        await request('/register', {
          username: document.getElementById('reg-user').value,
          password: document.getElementById('reg-pass').value,
        });
        // show success text in green
        const errElem = document.getElementById('error');
        errElem.style.color = '#5f5';
        errElem.textContent = 'Registrierung erfolgreich! Jetzt anmelden ...';
        // reset to normal color after a short time
        setTimeout(() => { errElem.style.color = '#f55'; }, 4000);

        // pre-fill login form and switch to login mode
        document.getElementById('login-user').value = document.getElementById('reg-user').value;
        document.getElementById('login-pass').value = document.getElementById('reg-pass').value;
        setMode('login');
      } catch (err) {
        showError(err.message);
      }
    });

    // Guest button
    document.getElementById('guest-btn').addEventListener('click', async () => {
      try {
        const data = await request('/guest', {});
        currentUser = data.username;
        currentToken = null;
        currentUserColor = data.color || "#ffffff";
        currentUserIsGuest = true;
        updateAvatar();
        startChat();
        showUserInfo();
      } catch (err) {
        showError(err.message);
      }
    });

    async function startChat() {
      document.getElementById('auth').style.display = 'none';
      document.getElementById('chat').style.display = 'flex';
      await refreshDeletedUsers();
      await loadPeers();
      connectWs();
    }

    // restore saved session if "remember me" was checked
    (function restoreSession() {
      const saved = localStorage.getItem('chatSession');
      if (saved) {
        try {
          const obj = JSON.parse(saved);
          currentUser = obj.username;
          currentToken = obj.token;
          currentUserColor = obj.color || "#ffffff";
          currentUserIsGuest = false;
          updateAvatar();
          // restore private chats from localStorage
          if (obj.privateChats && Array.isArray(obj.privateChats)) {
            privateChats = new Set(obj.privateChats);
          }
          if (obj.unreadCounts && typeof obj.unreadCounts === 'object') {
            unreadCounts = obj.unreadCounts;
            updatePrivateChatsBadge();
          }
          startChat();
          showUserInfo();
          // fetch current color from backend to ensure it's up-to-date
          fetch(BACKEND_URL + '/user-color/' + encodeURIComponent(currentUser))
            .then(res => res.json())
            .then(data => {
              currentUserColor = data.color;
              document.getElementById('username-display').style.color = currentUserColor;
            })
            .catch(e => console.warn('Failed to fetch current color', e));
        } catch (e) {
          console.warn('Failed to restore session', e);
          localStorage.removeItem('chatSession');
        }
      }
    })();

    function connectWs() {
      let url = `${WS_URL}/ws/chat?username=${encodeURIComponent(currentUser)}`;
      if (currentToken) {
        url += `&token=${encodeURIComponent(currentToken)}`;
      }
      ws = new WebSocket(url);

      ws.onmessage = event => {
        try {
          const obj = JSON.parse(event.data);
          if (obj.type === 'MESSAGE_NEW') {
            handleIncomingMessage(obj.message);
            return;
          }
          if (obj.type === 'MESSAGE_EDIT') {
            const updated = obj.message;
            if (updated) {
              messageLookup.set(updated.id, updated);
              if (pendingEdit && pendingEdit.id === updated.id) {
                resetComposeState();
              }
              if (messageBelongsToCurrentView(updated)) {
                upsertMessageInCurrentView(updated, false);
              }
              if (updated.username === currentUser) {
                const left = getRemainingEdits(updated);
                showToast(`Nachricht bearbeitet. Verbleibende Änderungen: ${left}`);
              }
            }
            return;
          }
        } catch (e) {
          // backward compatibility with old pipe format
        }

        const parts = event.data.split('|');
        if (parts[0] === "SYSTEM") {
          showToast(parts.slice(1).join("|"));
          return;
        }
        if (parts[0] === "ACCOUNT_DELETED") {
          const deletedUsername = parts.slice(1).join("|");
          if (deletedUsername) {
            deletedUsers.add(deletedUsername);
            userColorCache[deletedUsername] = "#888888";
            if (currentChat === deletedUsername) {
              document.getElementById('chat-mode').textContent = `Chat mit ${getDisplayUsername(deletedUsername)}`;
            }
            loadHistory(currentChat);
          }
        }
      };

      ws.onopen = () => {
        console.log('WebSocket verbunden');
        // populate current view with history
        if (currentChat === null) {
          loadHistory(null);
        } else {
          loadHistory(currentChat);
        }
      };
      ws.onclose = () => console.log('WebSocket getrennt');
    }

    document.getElementById('send').addEventListener('click', () => {
      const input = document.getElementById('input');
      const value = input.value.trim();
      if (!value || !ws || ws.readyState !== WebSocket.OPEN) return;

      if (pendingEdit) {
        if (!canEditMessage(pendingEdit)) {
          showToast(isWithinEditWindow(pendingEdit) ? 'Maximal 2 Bearbeitungen pro Nachricht erlaubt.' : 'Bearbeiten nur innerhalb von 30 Minuten m�glich.');
          resetComposeState();
          return;
        }
        ws.send(JSON.stringify({
          type: 'EDIT',
          message_id: pendingEdit.id,
          content: value
        }));
      } else if (currentChat === null) {
        ws.send(JSON.stringify({
          type: 'PUBLIC',
          content: value,
          reply_to_id: pendingReply ? pendingReply.id : null
        }));
      } else {
        ws.send(JSON.stringify({
          type: 'PRIVATE',
          target: currentChat,
          content: value,
          reply_to_id: pendingReply ? pendingReply.id : null
        }));
      }

      input.value = '';
      resetComposeState();
      input.focus();
    });

    document.getElementById('input').addEventListener('keypress', e => {
      if (e.key === 'Enter') {
        document.getElementById('send').click();
      }
    });

    document.getElementById('compose-cancel').addEventListener('click', () => {
      resetComposeState();
      document.getElementById('input').focus();
    });

    // Private Chats modal
    document.getElementById('private-chats-btn').addEventListener('click', () => {
      const list = document.getElementById('private-chats-list');
      list.innerHTML = '';
      // render private chats with unread counts
      privateChats.forEach(username => {
        const li = document.createElement('li');
        const nameSpan = document.createElement('span');
        nameSpan.textContent = getDisplayUsername(username);
        li.appendChild(nameSpan);
        const count = unreadCounts[username] || 0;
        if (count > 0) {
          const cb = document.createElement('span');
          cb.className = 'chat-count';
          cb.textContent = count;
          li.appendChild(cb);
        }
        li.addEventListener('click', () => openPrivateChat(username));
        list.appendChild(li);
      });
      document.getElementById('private-chats-modal').classList.add('show');
    });

    // Registered Users modal
    document.getElementById('registered-users-btn').addEventListener('click', async () => {
      try {
        const [registeredRes, onlineRes] = await Promise.all([
          fetch(BACKEND_URL + '/registered-users'),
          fetch(BACKEND_URL + '/online-users'),
        ]);
        const [registeredData, onlineData] = await Promise.all([
          registeredRes.json(),
          onlineRes.json(),
        ]);
        const onlineUsers = new Set((onlineData.users || []).filter(u => u !== currentUser));
        const list = document.getElementById('registered-users-list');
        list.innerHTML = '';
        (registeredData.users || []).filter(u => u !== currentUser).forEach(username => {
          const li = document.createElement('li');
          const userEntry = document.createElement('span');
          userEntry.className = 'user-entry';

          const statusDot = document.createElement('span');
          const isOnline = onlineUsers.has(username);
          statusDot.className = `user-status-dot ${isOnline ? 'online' : 'offline'}`;
          statusDot.title = isOnline ? 'Online' : 'Offline';

          const nameSpan = document.createElement('span');
          nameSpan.textContent = username;

          userEntry.appendChild(statusDot);
          userEntry.appendChild(nameSpan);
          li.appendChild(userEntry);
          li.addEventListener('click', () => openPrivateChat(username));
          list.appendChild(li);
        });
        document.getElementById('registered-users-modal').classList.add('show');
      } catch (err) {
        showError('Fehler beim Laden der registrierten Benutzer: ' + err.message);
      }
    });

    // Close modals
    document.getElementById('close-private-chats').addEventListener('click', () => {
      document.getElementById('private-chats-modal').classList.remove('show');
    });

    document.getElementById('close-registered-users').addEventListener('click', () => {
      document.getElementById('registered-users-modal').classList.remove('show');
    });

    // Click outside modal to close
     document.getElementById('private-chats-modal').addEventListener('click', (e) => {
      if (e.target.id === 'private-chats-modal') {
        document.getElementById('private-chats-modal').classList.remove('show');
      }
    });

    document.getElementById('registered-users-modal').addEventListener('click', (e) => {
      if (e.target.id === 'registered-users-modal') {
        document.getElementById('registered-users-modal').classList.remove('show');
      }
    });

    function openPrivateChat(username) {
      currentChat = username;
      privateChats.add(username);
      // save updated private chats to localStorage
      const saved = localStorage.getItem('chatSession');
      if (saved) {
        try {
          const obj = JSON.parse(saved);
          obj.privateChats = Array.from(privateChats);
          localStorage.setItem('chatSession', JSON.stringify(obj));
        } catch (e) {
          console.warn('Failed to save private chats', e);
        }
      }
      // mark messages as read for this chat
      if (unreadCounts[username]) {
        unreadCounts[username] = 0;
        updatePrivateChatsBadge();
        // persist cleared count
        const saved = localStorage.getItem('chatSession');
        if (saved) {
          try {
            const obj = JSON.parse(saved);
            obj.unreadCounts = unreadCounts;
            localStorage.setItem('chatSession', JSON.stringify(obj));
          } catch (e) {
            console.warn('Failed to save unreadCounts', e);
          }
        }
        }
      document.getElementById('messages').innerHTML = '';
      document.getElementById('chat-mode').textContent = `Chat mit ${getDisplayUsername(username)}`;
      document.getElementById('private-chats-modal').classList.remove('show');
      document.getElementById('registered-users-modal').classList.remove('show');
      document.getElementById('input').focus();
      loadHistory(username);
    }

    function switchToPublicChat() {
      currentChat = null;
      document.getElementById('messages').innerHTML = '';
      document.getElementById('chat-mode').textContent = 'Öffentlicher Chat';
      document.getElementById('input').focus();
      loadHistory(null);
    }

    document.getElementById('back-to-public-btn').addEventListener('click', () => {
      switchToPublicChat();
      document.getElementById('private-chats-modal').classList.remove('show');
    });

    document.getElementById('logout-btn').addEventListener('click', () => {
      currentUser = null;
      currentToken = null;
      currentUserColor = "#ffffff";
      currentUserIsGuest = false;
      updateAvatar();
      activeMode = null;
      currentChat = null;
      privateChats.clear();
      localStorage.removeItem('chatSession');
      if (ws) {
        ws.close();
      }
      document.getElementById('login-user').value = '';
      document.getElementById('login-pass').value = '';
      document.getElementById('reg-user').value = '';
      document.getElementById('reg-pass').value = '';
       document.getElementById('error').textContent = '';
      document.getElementById('auth').style.display = 'block';
      document.getElementById('chat').style.display = 'none';
      document.getElementById('private-chats-modal').classList.remove('show');
      document.getElementById('user-info').style.display = 'none';
      document.getElementById('user-menu').classList.remove('show');
    });  </script>
