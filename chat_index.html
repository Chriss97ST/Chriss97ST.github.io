<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Dark Chat</title>
  <style>
    /* dark theme base */
    body {
      margin: 0;
      font-family: sans-serif;
      background: #121212;
      color: #eee;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      position: relative;
      padding-bottom: 5rem;
    }

    h1 {
      margin: 1rem 0;
    }

    .container {
      width: 90%;
      max-width: 800px;
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    /* auth panel */
    #auth {
      margin-top: 2rem;
      animation: fadeIn 0.5s;
    }

    /* mode buttons side by side */
    .mode-buttons {
      display: flex;
      gap: 1rem;
      margin-bottom: 1.5rem;
    }

    .mode-btn {
      flex: 1;
      padding: 0.8rem;
      border: 2px solid #387ff5;
      border-radius: 4px;
      background: transparent;
      color: #387ff5;
      cursor: pointer;
      transition: all 0.2s ease;
      font-weight: bold;
    }

    .mode-btn:hover {
      background: #387ff5;
      color: #fff;
    }

    .mode-btn.active {
      background: #387ff5;
      color: #fff;
    }

    form {
      display: none;
      flex-direction: column;
      margin-bottom: 1rem;
    }

    form.active {
      display: flex;
      animation: fadeIn 0.3s;
    }

    input[type="text"],
    input[type="password"] {
      padding: 0.5rem;
      margin: 0.5rem 0;
      border: none;
      border-radius: 4px;
      background: #1e1e1e;
      color: #eee;
    }

    button {
      padding: 0.6rem;
      border: none;
      border-radius: 4px;
      background: #387ff5;
      color: #fff;
      cursor: pointer;
      transition: background 0.2s ease;
    }

    button:hover {
      background: #2e6fd1;
    }

    /* guest join button */
    #guest-btn {
      margin-top: 1rem;
    }

    #error {
      color: #f55;
      min-height: 1.2em;
      margin-bottom: 1rem;
    }

    #chat {
      display: none;
      flex: 1;
      flex-direction: column;
      margin-top: 1rem;
    }

    /* Top buttons */
    .top-buttons {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1rem;
    }

    .top-btn {
      padding: 0.5rem 1rem;
      background: #387ff5;
      color: #fff;
      border: none;
      border-radius: 4px;
      position: relative;
      cursor: pointer;
      font-size: 0.9rem;
      transition: background 0.2s ease;
    }

    .top-btn:hover {
      background: #2e6fd1;
    }

    .chat-mode-indicator {
      padding: 0.5rem 1rem;
      background: #1e1e1e;
      border-radius: 4px;
      font-size: 0.9rem;
      flex: 1;
      text-align: center;
    }

    /* Modal styles */
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.7);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }

    .modal.show {
      display: flex;
    }

    .modal-content {
      background: #1e1e1e;
      border-radius: 8px;
      padding: 1.5rem;
      max-width: 400px;
      width: 90%;
      max-height: 80vh;
      overflow-y: auto;
      position: relative;
      animation: slideIn 0.3s ease;
    }

    .modal-content h2 {
      margin-top: 0;
    }

    .close {
      position: absolute;
      top: 1rem;
      right: 1rem;
      font-size: 2rem;
      cursor: pointer;
      color: #f55;
    }

    .close:hover {
      color: #ff8888;
    }

    .user-list {
      list-style: none;
      padding: 0;
      margin: 0;
    }

    .user-list li {
      padding: 0.8rem;
      margin: 0.5rem 0;
      background: #121212;
      border-radius: 4px;
      cursor: pointer;
      transition: background 0.2s ease;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .user-list li:hover {
      background: #2a2a2a;
    }

    @keyframes slideIn {
      from { transform: translateY(-20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    #messages {
      flex: 1;
      background: #1e1e1e;
      border-radius: 4px;
      padding: 0.5rem;
      overflow-y: auto;
      max-height: calc(100vh - 260px);
    }

    .message {
      margin: 0.2rem 0;
      animation: fadeIn 0.3s;
    }

    #input-area {
      display: flex;
      margin-top: 0.5rem;
      gap: 0.5rem;
    }

    #input {
      flex: 1;
      padding: 0.5rem;
      border: none;
      border-radius: 4px;
      background: #1e1e1e;
      color: #eee;
    }

    /* back button */
    .back-btn {
      position: fixed;
      bottom: 1rem;
      left: 1rem;
      padding: 0.6rem 1rem;
      background: #387ff5;
      color: #fff;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.2s ease;
      font-weight: bold;
      font-size: 0.9rem;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .back-btn:hover {
      background: #2e6fd1;
    }

    /* footer container */
    .footer-buttons {
      position: relative;
      margin-left: 0.5rem;
      display: flex;
      gap: 0.5rem;
      display: none;
      align-items: center;
    }

    .footer-buttons.show {
      display: flex;
    }

    .footer-btn {
      padding: 0.3rem 0.5rem;
      margin-right: 15px;
      background: #387ff5;
      color: #fff;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.2s ease;
      font-weight: bold;
      font-size: 0.9rem;
      white-space: nowrap;
    }

    .footer-btn:hover {
      background: #2e6fd1;
    }

    /* header and user-info styling */
    .header {
      width: 90%;
      max-width: 800px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 1rem;
    }
    .header h1 {
      margin: 0;
    }
    .user-info {
      background: #1e1e1e;
      border: 2px solid #387ff5;
      border-radius: 4px;
      color: #eee;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
      padding: 0.4rem 0.6rem;
      position: relative;
    }
    .user-info span {
      font-weight: bold;
      cursor: pointer;
      padding: 0.2rem 0.4rem;
      border-radius: 3px;
      transition: background 0.2s ease;
      flex-shrink: 0;
    }
    .user-info span:hover {
      background: rgba(56, 127, 245, 0.2);
    }
    .user-actions {
      display: flex;
      gap: 0.4rem;
      width: 100%;
      justify-content: center;
    }
    .menu-btn, #logout-btn {
      padding: 0.3rem 0.6rem;
      font-size: 0.8rem;
      background: #387ff5;
      color: #fff;
      border: none;
      border-radius: 3px;
      cursor: pointer;
      transition: background 0.2s ease;
    }
    .menu-btn:hover, #logout-btn:hover {
      background: #2e6fd1;
    }
    /* user menu dropdown */
    .user-menu {
      display: none;
      position: absolute;
      top: 100%;
      right: 0;
      background: #1e1e1e;
      border: 2px solid #387ff5;
      border-radius: 4px;
      margin-top: 0.5rem;
      min-width: 280px;
      padding: 0.8rem;
      z-index: 2001;
      flex-direction: column;
      gap: 0.6rem;
    }
    .user-menu.show {
      display: flex;
    }
    .user-menu h3 {
      margin: 0;
      font-size: 0.9rem;
      color: #eee;
    }
    .menu-section {
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
    }
    .menu-section label {
      font-size: 0.8rem;
      color: #aaa;
      font-weight: bold;
    }
    .color-picker-wrapper {
      display: flex;
      gap: 0.5rem;
      align-items: center;
    }
    .user-menu input[type="color"] {
      width: 50px;
      height: 32px;
      border: none;
      border-radius: 3px;
      cursor: pointer;
    }
    .update-color-btn {
      padding: 0.35rem 0.6rem;
      font-size: 0.8rem;
      border-radius: 3px;
      color: #fff;
      border: none;
      cursor: pointer;
    }
    .color-value {
      font-size: 0.8rem;
      color: #aaa;
      flex-shrink: 0;
    }
    .user-menu input[type="password"],
    .user-menu input[type="text"] {
      padding: 0.4rem;
      border: none;
      border-radius: 3px;
      background: #121212;
      color: #eee;
      width: 100%;
      box-sizing: border-box;
      font-size: 0.85rem;
    }
    .user-menu button {
      padding: 0.4rem;
      background: #387ff5;
      color: #fff;
      border: none;
      border-radius: 3px;
      cursor: pointer;
      font-size: 0.8rem;
      transition: background 0.2s ease;
    }
    .user-menu button:hover {
      background: #2e6fd1;
    }

    /* badge for new private messages */
    .badge {
      position: absolute;
      top: -6px;
      right: -8px;
      background: #f55;
      color: #fff;
      padding: 0 6px;
      border-radius: 12px;
      font-size: 0.75rem;
      line-height: 20px;
      display: none;
    }

    .chat-count {
      background: #f55;
      color: #fff;
      padding: 0 8px;
      border-radius: 12px;
      font-size: 0.85rem;
      margin-left: 0.5rem;
      min-width: 28px;
      text-align: center;
    }

    .password-section {
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(5px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 600px) {
      #input-area { flex-direction: column; }
      #input { margin-bottom: 0; }
      .mode-buttons { flex-direction: column; }
    }

    /* toast notification */
    .toast {
      position: fixed;
      top: 1rem;
      left: 50%;
      transform: translateX(-50%);
      background: #333;
      color: #fff;
      padding: 0.8rem 1rem;
      border: 2px solid #387ff5;
      border-radius: 4px;
      opacity: 0;
      transition: opacity 0.3s ease;
      z-index: 2000;
      cursor: pointer;
      animation: slideDown 0.4s ease;
    }
    .toast.show {
      opacity: 1;
    }

    @keyframes slideDown {
      from { transform: translate(-50%, -20px); opacity: 0; }
      to { transform: translate(-50%, 0); opacity: 1; }
    }

    /* fade utility for chat messages */
    #messages.fading {
      opacity: 0;
      transition: opacity 0.3s ease;
    }
    #messages {
      flex: 1;
      background: #1e1e1e;
      border-radius: 4px;
      padding: 0.5rem;
      overflow-y: auto;
      opacity: 1;
      transition: opacity 0.3s ease;
      max-height: calc(100vh - 260px);
    }
  </style>
</head>
<body>
  <header class="header">
    <h1>Dark Chat</h1>
    <div class="footer-buttons show">
      <a href="/index.html" class="footer-btn">🏠 Home</a>
    </div>
    <div id="user-info" class="user-info" style="display: none;">
      <span id="username-display"></span>
      <div class="user-actions">
        <button class="menu-btn" id="menu-btn">⋯ mehr</button>
        <button id="logout-btn">🚪logout</button>
      </div>
      <div id="user-menu" class="user-menu">
        <!-- menu content added dynamically -->
      </div>
    </div>
  </header>
  <div class="container">
    <div id="auth">
      <div id="error"></div>
      
      <!-- Mode selection buttons -->
      <div class="mode-buttons">
        <button class="mode-btn" id="login-mode-btn">Login</button>
        <button class="mode-btn" id="register-mode-btn">Registrieren</button>
      </div>

      <!-- Login form -->
      <form id="login-form">
        <input id="login-user" type="text" placeholder="Benutzername" required />
        <input id="login-pass" type="password" placeholder="Passwort" required />
        <label style="font-size:0.85rem; display:flex; align-items:center; gap:0.3rem;">
          <input type="checkbox" id="remember-me" /> Angemeldet bleiben
        </label>
        <button type="submit">Anmelden</button>
      </form>

      <!-- Register form -->
      <form id="register-form">
        <input id="reg-user" type="text" placeholder="Neuer Benutzername" required />
        <input id="reg-pass" type="password" placeholder="Passwort" required />
        <button type="submit">Registrieren</button>
      </form>

      <!-- Guest button always visible -->
      <button id="guest-btn">Als Gast beitreten</button>
    </div>

    <div id="chat">
      <div class="top-buttons">
        <button class="top-btn" id="online-users-btn">👥 Online</button>
        <button class="top-btn" id="private-chats-btn">💬 Chats</button>
        <div class="chat-mode-indicator" id="chat-mode">Öffentlicher Chat</div>
      </div>
      <div id="messages"></div>
      <div id="input-area">
        <input id="input" type="text" placeholder="Nachricht eingeben" autocomplete="off" />
        <button id="send">Senden</button>
      </div>
    </div>
  </div>

  <!-- Online Users Modal -->
  <div id="online-users-modal" class="modal">
    <div class="modal-content">
      <span class="close" id="close-online-users">&times;</span>
      <h2>Online Benutzer</h2>
      <ul id="online-users-list" class="user-list"></ul>
    </div>
  </div>

  <!-- Private Chats Modal -->
  <div id="private-chats-modal" class="modal">
    <div class="modal-content">
      <span class="close" id="close-private-chats">&times;</span>
      <h2>Private Chats</h2>
      <ul id="private-chats-list" class="user-list"></ul>
      <button id="back-to-public-btn" style="width: 100%; margin-top: 1rem;">← Zurück zum öffentlichen Chat</button>
    </div>
  </div>

  <!-- footer moved into header -->

  <script>
    // Backend configuration
    // the backend is served under "/chat" on the DDNS host
    const BACKEND_URL = 'https://chriss97st.ddns.net/chat';
    const WS_URL = 'wss://chriss97st.ddns.net/chat';

    let ws;
    let currentUser;
    let currentToken;
    let currentUserColor = "#ffffff";
    let currentUserIsGuest = false;
    let userColorCache = {};  // cache {username: color} to avoid repeated requests
    let activeMode = null;
    let currentChat = null; // null = public, username = private chat
    let privateChats = new Set(); // usernames we have private chats with
    let unreadCounts = {}; // {username: count}


    function updatePrivateChatsBadge() {
      const btn = document.getElementById('private-chats-btn');
      if (!btn) return;
      const total = Object.values(unreadCounts).reduce((a, b) => a + (b || 0), 0);
      let badge = btn.querySelector('.badge');
      if (!badge) {
        badge = document.createElement('span');
        badge.className = 'badge';
        btn.appendChild(badge);
      }
      if (total > 0) {
        badge.textContent = total;
        badge.style.display = 'inline-block';
      } else {
        badge.style.display = 'none';
      }
    }

    function showError(msg) {
      document.getElementById('error').textContent = msg;
    }

    async function getUserColor(username) {
      if (username === currentUser) {
        return currentUserColor;
      }
      if (userColorCache[username]) {
        return userColorCache[username];
      }
      try {
        const res = await fetch(BACKEND_URL + '/user-color/' + encodeURIComponent(username));
        const data = await res.json();
        userColorCache[username] = data.color;
        return data.color;
      } catch (e) {
        return "#ffffff";
      }
    }

    async function renderMessageWithColor(username, content, time) {
      const div = document.createElement('div');
      div.className = 'message';
      const color = await getUserColor(username);
      
      const timeSpan = document.createElement('span');
      timeSpan.textContent = time + ' ';
      timeSpan.style.color = '#aaa';
      
      const userSpan = document.createElement('span');
      userSpan.textContent = username + ': ';
      userSpan.style.color = color;
      userSpan.style.fontWeight = 'bold';
      
      const contentSpan = document.createElement('span');
      contentSpan.textContent = content;
      
      div.appendChild(timeSpan);
      div.appendChild(userSpan);
      div.appendChild(contentSpan);
      return div;
    }

    

    function showError(msg) {
      document.getElementById('error').textContent = msg;
    }

    function showUserInfo() {
      const info = document.getElementById('user-info');
      const display = document.getElementById('username-display');
      display.textContent = currentUser;
      display.style.color = currentUserColor;
      info.style.display = 'flex';
      buildUserMenu();
    }

    function buildUserMenu() {
      const menu = document.getElementById('user-menu');
      menu.innerHTML = '';
      
      if (currentUserIsGuest) {
        // Guest: show password registration option
        menu.innerHTML = `
          <div class="menu-section">
            <h3>Account registrieren</h3>
            <input type="password" id="guest-pass" placeholder="Neues Passwort" />
            <button id="register-guest-btn">Account sichern</button>
          </div>
        `;
        document.getElementById('register-guest-btn').addEventListener('click', registerGuest);
      } else {
        // Registered: show color picker and expandable password change
        menu.innerHTML = `
          <div class="menu-section">
            <label>Namensfarbe</label>
            <div class="color-picker-wrapper">
              <input type="color" id="color-picker" value="${currentUserColor}" />
              <span class="color-value" id="color-value">${currentUserColor}</span>
              <button id="update-color-btn" class="update-color-btn">Speichern</button>
            </div>
          </div>
          <div class="menu-section">
            <button id="toggle-password-btn">Passwort ändern</button>
            <div id="password-section" style="display: none;" class="password-section">
              <input type="password" id="old-pass" placeholder="Altes Passwort" />
              <input type="password" id="new-pass" placeholder="Neues Passwort" />
              <button id="change-pass-btn">Ändern</button>
            </div>
          </div>
        `;

        const colorPicker = document.getElementById('color-picker');
        const colorValue = document.getElementById('color-value');

        document.getElementById('update-color-btn').addEventListener('click', updateUserColor);
        colorPicker.addEventListener('change', (e) => {
          colorValue.textContent = e.target.value;
        });

        document.getElementById('toggle-password-btn').addEventListener('click', () => {
          const section = document.getElementById('password-section');
          section.style.display = section.style.display === 'none' ? 'flex' : 'none';
        });

        document.getElementById('change-pass-btn').addEventListener('click', changePassword);
      }
    }

    async function changePassword() {
      const oldPass = document.getElementById('old-pass').value;
      const newPass = document.getElementById('new-pass').value;
      if (!oldPass || !newPass) {
        alert('Beide Passwörter erforderlich');
        return;
      }
      try {
        await fetch(BACKEND_URL + '/change-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username: currentUser, old_password: oldPass, new_password: newPass }),
        });
        showError('Passwort erfolgreich geändert!');
        document.getElementById('old-pass').value = '';
        document.getElementById('new-pass').value = '';
        setTimeout(() => showError(''), 2000);
      } catch (e) {
        showError('Fehler: ' + e.message);
      }
    }

    async function registerGuest() {
      const password = document.getElementById('guest-pass').value;
      if (!password) {
        alert('Passwort erforderlich');
        return;
      }
      try {
        await fetch(BACKEND_URL + '/register-guest', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username: currentUser, password: password }),
        });
        currentUserIsGuest = false;
        buildUserMenu();
        showError('Account erfolgreich registriert!');
        setTimeout(() => showError(''), 2000);
      } catch (e) {
        showError('Fehler: ' + e.message);
      }
    }

    async function updateUserColor() {
      const color = document.getElementById('color-picker').value;
      try {
        await fetch(BACKEND_URL + '/update-color', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username: currentUser, color: color }),
        });
        currentUserColor = color;
        document.getElementById('username-display').style.color = currentUserColor;
        // color saved; update displayed username color
        showError('Farbe gespeichert!');
        setTimeout(() => showError(''), 2000);
      } catch (e) {
        showError('Fehler: ' + e.message);
      }
    }

    function showToast(message, user) {
      const toast = document.createElement('div');
      toast.className = 'toast';
      toast.textContent = message;
      if (user) {
        toast.dataset.user = user;
        toast.addEventListener('click', () => {
          openPrivateChat(user);
          toast.remove();
        });
      }
      document.body.appendChild(toast);
      // trigger show after insertion
      setTimeout(() => toast.classList.add('show'), 10);
      // remove after a few seconds unless clicked
      const hide = () => {
        toast.classList.remove('show');
        setTimeout(() => toast.remove(), 300);
      };
      setTimeout(hide, 4000);
    }

    function setMode(mode) {
      activeMode = mode;
      
      // Update button styles
      const loginBtn = document.getElementById('login-mode-btn');
      const registerBtn = document.getElementById('register-mode-btn');
      
      if (mode === 'login') {
        loginBtn.classList.add('active');
        registerBtn.classList.remove('active');
        document.getElementById('login-form').classList.add('active');
        document.getElementById('register-form').classList.remove('active');
      } else if (mode === 'register') {
        registerBtn.classList.add('active');
        loginBtn.classList.remove('active');
        document.getElementById('register-form').classList.add('active');
        document.getElementById('login-form').classList.remove('active');
      }
    }

    async function request(path, body) {
      const res = await fetch(BACKEND_URL + path, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body),
      });
      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        throw new Error(err.detail || res.statusText);
      }
      return res.json();
    }

    async function loadHistory(peer) {
      const messages = document.getElementById('messages');
      // fade out, then load
      messages.classList.add('fading');
      try {
        let url = BACKEND_URL + '/history?username=' + encodeURIComponent(currentUser);
        if (peer) url += '&peer=' + encodeURIComponent(peer);
        const res = await fetch(url);
        const data = await res.json();
        messages.innerHTML = '';
        for (const m of data) {
          const time = new Date(m.timestamp).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit', hour12: false});
          const messageDiv = await renderMessageWithColor(m.username, m.content, time);
          messages.appendChild(messageDiv);
        }
        messages.scrollTop = messages.scrollHeight;
      } catch (e) {
        console.error('history error', e);
      }
      // fade back in
      setTimeout(() => messages.classList.remove('fading'), 50);
    }

    // Toggle user menu on more button click
    document.getElementById('menu-btn').addEventListener('click', (e) => {
      e.stopPropagation();
      const menu = document.getElementById('user-menu');
      menu.classList.toggle('show');
    });

    // Close menu when clicking outside
    document.addEventListener('click', () => {
      document.getElementById('user-menu').classList.remove('show');
    });

    // Close menu when clicking inside it (prevent bubbling)
    document.getElementById('user-menu').addEventListener('click', (e) => {
      e.stopPropagation();
    });

    // Mode buttons
    document.getElementById('login-mode-btn').addEventListener('click', () => setMode('login'));
    document.getElementById('register-mode-btn').addEventListener('click', () => setMode('register'));

    // Login form submit
    document.getElementById('login-form').addEventListener('submit', async e => {
      e.preventDefault();
      try {
        const data = await request('/login', {
          username: document.getElementById('login-user').value,
          password: document.getElementById('login-pass').value,
        });
        currentUser = data.username;
        currentToken = data.access_token;
        currentUserColor = data.color || "#ffffff";
        currentUserIsGuest = false;
        const remember = document.getElementById('remember-me').checked;
        if (remember) {
          localStorage.setItem('chatSession', JSON.stringify({
            username: currentUser,
            token: currentToken,
            color: currentUserColor
          }));
        } else {
          localStorage.removeItem('chatSession');
        }
        startChat();
        showUserInfo();
      } catch (err) {
        showError(err.message);
      }
    });

    // Register form submit
    document.getElementById('register-form').addEventListener('submit', async e => {
      e.preventDefault();
      try {
        await request('/register', {
          username: document.getElementById('reg-user').value,
          password: document.getElementById('reg-pass').value,
        });
        // show success text in green
        const errElem = document.getElementById('error');
        errElem.style.color = '#5f5';
        errElem.textContent = 'Registrierung erfolgreich! Jetzt anmelden ...';
        // reset to normal color after a short time
        setTimeout(() => { errElem.style.color = '#f55'; }, 4000);

        // pre-fill login form and switch to login mode
        document.getElementById('login-user').value = document.getElementById('reg-user').value;
        document.getElementById('login-pass').value = document.getElementById('reg-pass').value;
        setMode('login');
      } catch (err) {
        showError(err.message);
      }
    });

    // Guest button
    document.getElementById('guest-btn').addEventListener('click', async () => {
      try {
        const data = await request('/guest', {});
        currentUser = data.username;
        currentToken = null;
        currentUserColor = data.color || "#ffffff";
        currentUserIsGuest = true;
        startChat();
        showUserInfo();
      } catch (err) {
        showError(err.message);
      }
    });

    function startChat() {
      document.getElementById('auth').style.display = 'none';
      document.getElementById('chat').style.display = 'flex';
      connectWs();
    }

    // restore saved session if "remember me" was checked
    (function restoreSession() {
      const saved = localStorage.getItem('chatSession');
      if (saved) {
        try {
          const obj = JSON.parse(saved);
          currentUser = obj.username;
          currentToken = obj.token;
          currentUserColor = obj.color || "#ffffff";
          currentUserIsGuest = false;
          startChat();
          showUserInfo();
        } catch (e) {
          console.warn('Failed to restore session', e);
          localStorage.removeItem('chatSession');
        }
      }
    })();

    function connectWs() {
      let url = `${WS_URL}/ws/chat?username=${encodeURIComponent(currentUser)}`;
      if (currentToken) {
        url += `&token=${encodeURIComponent(currentToken)}`;
      }
      ws = new WebSocket(url);

      ws.onmessage = event => {
        const messages = document.getElementById('messages');
        const parts = event.data.split('|');
        
        if (parts[0] === 'PUBLIC') {
          const fullMsg = parts.slice(1).join('|');
          // parse "time username: content"
          const match = fullMsg.match(/^(\d{2}:\d{2}) ([^:]+): (.*)$/);
          if (match && currentChat === null) {
            const [, time, username, content] = match;
            renderMessageWithColor(username, content, time).then(div => {
              messages.appendChild(div);
              messages.scrollTop = messages.scrollHeight;
            });
          }
        } else if (parts[0] === 'PRIVATE') {
          const sender = parts[1];
          const fullMsg = parts.slice(2).join('|');
          // parse "time username: content"
          const match = fullMsg.match(/^(\d{2}:\d{2}) ([^:]+): (.*)$/);
          if (match && currentChat === sender) {
            const [, time, username, content] = match;
            renderMessageWithColor(username, content, time).then(div => {
              messages.appendChild(div);
              messages.scrollTop = messages.scrollHeight;
            });
          } else {
            // new private message for a chat we're not viewing
            // increment unread count
            unreadCounts[sender] = (unreadCounts[sender] || 0) + 1;
            updatePrivateChatsBadge();
            showToast(`Neue Nachricht von ${sender}`, sender);
          }
          privateChats.add(sender);
        }
      };

      ws.onopen = () => {
        console.log('WebSocket verbunden');
        // populate current view with history
        if (currentChat === null) {
          loadHistory(null);
        } else {
          loadHistory(currentChat);
        }
      };
      ws.onclose = () => console.log('WebSocket getrennt');
    }

    document.getElementById('send').addEventListener('click', () => {
      const input = document.getElementById('input');
      if (input.value.trim() !== '') {
        if (currentChat === null) {
          // Public chat
          ws.send(`PUBLIC|${input.value}`);
        } else {
          // Private chat
          ws.send(`PRIVATE|${currentChat}|${input.value}`);
        }
        input.value = '';
        input.focus();
      }
    });

    document.getElementById('input').addEventListener('keypress', e => {
      if (e.key === 'Enter') {
        document.getElementById('send').click();
      }
    });

    // Online Users modal
    document.getElementById('online-users-btn').addEventListener('click', async () => {
      try {
        const res = await fetch(BACKEND_URL + '/online-users');
        const data = await res.json();
        const list = document.getElementById('online-users-list');
        list.innerHTML = '';
        data.users.filter(u => u !== currentUser).forEach(username => {
          const li = document.createElement('li');
          li.textContent = username;
          li.addEventListener('click', () => openPrivateChat(username));
          list.appendChild(li);
        });
        document.getElementById('online-users-modal').classList.add('show');
      } catch (err) {
        showError('Fehler beim Laden der Online-Benutzer: ' + err.message);
      }
    });

    // Private Chats modal
    document.getElementById('private-chats-btn').addEventListener('click', () => {
      const list = document.getElementById('private-chats-list');
      list.innerHTML = '';
      // render private chats with unread counts
      privateChats.forEach(username => {
        const li = document.createElement('li');
        const nameSpan = document.createElement('span');
        nameSpan.textContent = username;
        li.appendChild(nameSpan);
        const count = unreadCounts[username] || 0;
        if (count > 0) {
          const cb = document.createElement('span');
          cb.className = 'chat-count';
          cb.textContent = count;
          li.appendChild(cb);
        }
        li.addEventListener('click', () => openPrivateChat(username));
        list.appendChild(li);
      });
      document.getElementById('private-chats-modal').classList.add('show');
    });

    // Close modals
    document.getElementById('close-online-users').addEventListener('click', () => {
      document.getElementById('online-users-modal').classList.remove('show');
    });

    document.getElementById('close-private-chats').addEventListener('click', () => {
      document.getElementById('private-chats-modal').classList.remove('show');
    });

    // Click outside modal to close
    document.getElementById('online-users-modal').addEventListener('click', (e) => {
      if (e.target.id === 'online-users-modal') {
        document.getElementById('online-users-modal').classList.remove('show');
      }
    });

    document.getElementById('private-chats-modal').addEventListener('click', (e) => {
      if (e.target.id === 'private-chats-modal') {
        document.getElementById('private-chats-modal').classList.remove('show');
      }
    });

    function openPrivateChat(username) {
      currentChat = username;
      privateChats.add(username);
      // mark messages as read for this chat
      if (unreadCounts[username]) {
        unreadCounts[username] = 0;
        updatePrivateChatsBadge();
      }
      document.getElementById('messages').innerHTML = '';
      document.getElementById('chat-mode').textContent = `Chat mit ${username}`;
      document.getElementById('online-users-modal').classList.remove('show');
      document.getElementById('private-chats-modal').classList.remove('show');
      document.getElementById('input').focus();
      loadHistory(username);
    }

    function switchToPublicChat() {
      currentChat = null;
      document.getElementById('messages').innerHTML = '';
      document.getElementById('chat-mode').textContent = 'Öffentlicher Chat';
      document.getElementById('input').focus();
      loadHistory(null);
    }

    document.getElementById('back-to-public-btn').addEventListener('click', () => {
      switchToPublicChat();
      document.getElementById('private-chats-modal').classList.remove('show');
    });

    document.getElementById('logout-btn').addEventListener('click', () => {
      currentUser = null;
      currentToken = null;
      currentUserColor = "#ffffff";
      currentUserIsGuest = false;
      activeMode = null;
      currentChat = null;
      privateChats.clear();
      localStorage.removeItem('chatSession');
      if (ws) {
        ws.close();
      }
      document.getElementById('login-user').value = '';
      document.getElementById('login-pass').value = '';
      document.getElementById('reg-user').value = '';
      document.getElementById('reg-pass').value = '';
      document.getElementById('error').textContent = '';
      document.getElementById('auth').style.display = 'block';
      document.getElementById('chat').style.display = 'none';
      document.getElementById('online-users-modal').classList.remove('show');
      document.getElementById('private-chats-modal').classList.remove('show');
      document.getElementById('user-info').style.display = 'none';
      document.getElementById('user-menu').classList.remove('show');
    });  </script>
</body>
</html>
