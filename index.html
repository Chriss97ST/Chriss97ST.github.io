<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Willkommen</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        /* --- Lade-Animation Overlay --- */
        #loader {
            position: fixed;
            inset: 0;
            background: #0d0d0d;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 999;
            animation: fadeOut 0.8s ease 1.2s forwards;
        }

        .spinner {
            width: 42px;
            height: 42px;
            border: 4px solid #333;
            border-top-color: #ffffff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @keyframes fadeOut {
            to { opacity: 0; visibility: hidden; }
        }

        /* --- Fade-In des Inhalts --- */
        body.fade-in {
            opacity: 0;
            transition: opacity 1s ease 0.3s;
        }

        body.loaded {
            opacity: 1;
        }


        body {
            height: 100vh;
            font-family: "Comic Sans MS", Arial, sans-serif;
            background: #0d0d0d;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
        }

        .container {
            max-width: 700px;
            width: 100%;
            animation: fadeIn 1.2s ease-in-out;
        }

        h1 {
            font-size: clamp(2rem, 5vw, 3rem);
            font-family: "Comic Sans MS", Arial, sans-serif;
            margin-bottom: 20px;
            font-weight: 700;
        }

        p {
            font-family: "Comic Sans MS", Arial, sans-serif;
            font-size: clamp(1rem, 2.5vw, 1.2rem);
            margin-bottom: 40px;
            color: #bbbbbb;
        }

        .button-group {
            margin-top: 40px;
            display: flex;
            flex-direction: column;
            gap: 24px;
            width: 90%;
            max-width: 420px;
        }

       /* --- Animierte Buttons / Aurora Style --- */
        .btn {
            font-family: "Comic Sans MS", Arial, sans-serif;
            position: relative;
            padding: 18px 25px;
            text-align: center;
            text-decoration: none;
            font-size: 1.2rem;
            border-radius: 12px;
            background: linear-gradient(145deg, #1a1a1a, #070707);
            color: white;
            border: 1px solid #2a2a2a;
            overflow: hidden;
            transition: 0.25s ease;
            box-shadow: 0 0 12px rgba(0,0,0,0.6);
        }

        .btn:hover {
            transform: scale(1.05);
            border-color: #666;
            background: linear-gradient(145deg, #222, #111);
            box-shadow: 0 0 20px rgba(255,255,255,0.07);
        }

        .btn:active {
            transform: scale(0.96);
        }

        /* Glow Effekt */
        .btn::before {
            content: "";
            position: absolute;
            top: -90%;
            left: -90%;
            width: 280%;
            height: 280%;
            background: radial-gradient(circle at center, rgba(255,255,255,0.13), transparent 60%);
            transform: scale(0);
            transition: 0.45s ease;
        }

        .btn:hover::before {
            transform: scale(1);
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (min-width: 600px) {
            .button-group {
                flex-direction: row;
                justify-content: center;
            }

            .btn {
                width: 200px;
            }
        }
    </style>
</head>
<body>
    <div id="loader">
        <div class="spinner"></div>
    </div>

    <div class="container">
        <h1>Willkommen,<br>willkommen...</h1>
        <p>...auf meinem digitalen Sandkasten.</p>
        <div class="button-group">
            <a href="wtf.html" class="btn">What the F#*!</a>
            <a href="suchmaschine_index.html" class="btn">BiLFiNGER || @WORK</a>
            <a href="chat_index.html" class="btn">Chat</a>
        </div>
    </div>
</body>
</html>
